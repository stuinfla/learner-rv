name: Release

# Phase 5: cross-platform release builds for the `learn` binary.
#
# Priority order (Stuart's choice):
#   1. aarch64-apple-darwin   (M-series Mac)   -- primary
#   2. x86_64-apple-darwin    (Intel Mac)      -- secondary
#   3. x86_64-unknown-linux-gnu                 -- best-effort
#   4. aarch64-unknown-linux-gnu                -- best-effort (cross)
#   5. x86_64-pc-windows-msvc                   -- best-effort (whisper-rs/metal not supported)
#
# Security note: this workflow does NOT consume any user-controllable event
# data (issue titles, PR bodies, commit messages) inside run: blocks. The only
# `workflow_dispatch` input (`reason`) is never referenced in shell. All
# expansions are matrix values or repository-controlled metadata.
#
# RuVector dependency: the workspace path-depends on `../ruvector/crates/*`.
# CI materialises this by doing a shallow clone of the public repo
# ruvnet/RuVector into the sibling path `../ruvector` before building.
# No secrets required — the repo is public (MIT licence).

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual release run (informational only; not used in build steps)"
        required: false
        default: "manual dispatch"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUST_TOOLCHAIN: "1.91.1"

jobs:
  # -------------------------------------------------------------------------
  # Single fmt + clippy gate. Runs once on macos-latest (cheaper than running
  # on every matrix entry). Required by the matrix builds via `needs:`.
  # -------------------------------------------------------------------------
  fmt-clippy:
    name: fmt + clippy gate
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - name: Checkout learn-rs
        uses: actions/checkout@v4

      - name: Clone ruvnet/RuVector (sibling, public)
        id: ruvector
        shell: bash
        run: |
          git clone --depth 1 --branch main \
            https://github.com/ruvnet/RuVector.git \
            ../ruvector
          echo "present=true" >> "$GITHUB_OUTPUT"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache cargo target (fmt-clippy)
        uses: actions/cache@v4
        with:
          path: target/
          key: ${{ runner.os }}-cargo-target-fmt-clippy-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-target-fmt-clippy-

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  # -------------------------------------------------------------------------
  # Release build matrix. Apple targets are required; Linux/Windows entries
  # are flagged best-effort and won't fail the workflow.
  # -------------------------------------------------------------------------
  build:
    name: Release build (${{ matrix.target }})
    needs: fmt-clippy
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          # 1. M-series Mac -- primary. Includes learn-asr (whisper-rs/metal).
          - target: aarch64-apple-darwin
            runner: macos-14
            os: macos
            archive_ext: tar.gz
            best_effort: false
            use_cross: false
            cargo_exclude: ""

          # NOTE: x86_64-apple-darwin (Intel Mac) is intentionally OMITTED.
          # The macos-13 runner is being deprecated and queued indefinitely
          # on v0.1.1 (observed 12+ hour hang, never picked up by a runner).
          # `continue-on-error` doesn't help because the timeout only starts
          # after a runner picks up the job. Re-add when GitHub provides a
          # stable Intel macOS image. Intel Mac users can build from source.

          # 3. Linux x86_64 -- best-effort (Phase 5).
          # learn-asr is excluded: whisper-rs vendors whisper.cpp with the `metal`
          # feature, which depends on Apple's Foundation framework (not available
          # on Linux). Per crate docstring, ASR is Apple-only by design.
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            os: linux
            archive_ext: tar.gz
            best_effort: true
            use_cross: false
            cargo_exclude: "--exclude learn-asr"

          # 4. Linux ARM64 -- best-effort (Phase 5), cross-compile via `cross`.
          # Same learn-asr exclusion as Linux x86_64. Note: `cross` runs the
          # build inside a Docker container that mounts only the project dir,
          # so the `../ruvector` sibling path-dependency is unreachable. This
          # target stays `continue-on-error: true` until ruvector is published
          # to crates.io or the workflow vendors it under the project tree.
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            os: linux
            archive_ext: tar.gz
            best_effort: true
            use_cross: true
            cargo_exclude: "--exclude learn-asr"

          # 5. Windows -- best-effort (Phase 5). Same learn-asr exclusion; the
          # whisper-rs `metal` feature is Apple-only.
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            os: windows
            archive_ext: zip
            best_effort: true
            use_cross: false
            cargo_exclude: "--exclude learn-asr"

    continue-on-error: ${{ matrix.best_effort }}

    steps:
      - name: Checkout learn-rs
        uses: actions/checkout@v4

      - name: Clone ruvnet/RuVector (sibling, public)
        id: have_ruvector
        shell: bash
        run: |
          git clone --depth 1 --branch main \
            https://github.com/ruvnet/RuVector.git \
            ../ruvector
          echo "present=true" >> "$GITHUB_OUTPUT"
          echo "ruvnet/RuVector cloned to ../ruvector"

      # ----- Platform deps ---------------------------------------------------

      - name: Install Linux build deps
        if: matrix.os == 'linux' && matrix.use_cross != true
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            clang \
            libclang-dev \
            pkg-config \
            libssl-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: ${{ matrix.target }}
          components: rustfmt, clippy

      - name: Install cross (Linux ARM64 only)
        if: matrix.use_cross == true
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      # ----- Caches ----------------------------------------------------------

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-registry-
            ${{ runner.os }}-cargo-registry-

      - name: Cache cargo target
        uses: actions/cache@v4
        with:
          path: target/
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-target-release-${{ hashFiles('**/Cargo.lock') }}-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-target-release-${{ hashFiles('**/Cargo.lock') }}-
            ${{ runner.os }}-${{ matrix.target }}-cargo-target-release-

      # ----- Build -----------------------------------------------------------

      - name: cargo build --release (native)
        if: matrix.use_cross != true
        shell: bash
        env:
          BUILD_TARGET: ${{ matrix.target }}
          CARGO_EXCLUDE: ${{ matrix.cargo_exclude }}
        run: |
          cargo build --release --workspace $CARGO_EXCLUDE --target "$BUILD_TARGET"

      - name: cross build --release (cross-compile)
        if: matrix.use_cross == true
        env:
          BUILD_TARGET: ${{ matrix.target }}
          CARGO_EXCLUDE: ${{ matrix.cargo_exclude }}
        run: cross build --release --workspace $CARGO_EXCLUDE --target "$BUILD_TARGET"

      # ----- Test ------------------------------------------------------------
      # Skip cross-compiled tests (can't run aarch64 binaries on x86 host).
      # ANTHROPIC_API_KEY-gated tests run only when the secret is provided.

      - name: cargo test --workspace --no-fail-fast
        if: matrix.use_cross != true
        shell: bash
        env:
          BUILD_TARGET: ${{ matrix.target }}
          CARGO_EXCLUDE: ${{ matrix.cargo_exclude }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cargo test --workspace $CARGO_EXCLUDE --no-fail-fast --target "$BUILD_TARGET"

      # ----- Package ---------------------------------------------------------

      # Stage the binary AND the Claude Code skill manifest so a single tarball
      # extract drops everything the user needs into ~/.claude/skills/learn-rv/.
      # Tarball layout:
      #   learn-<target>/
      #     bin/learn              (or learn.exe on Windows)
      #     SKILL.md               (Claude Code skill manifest)
      #     README.md
      #     LICENSE-MIT, LICENSE-APACHE
      #     install.sh             (optional helper to symlink bin into PATH)
      - name: Stage `learn` binary + skill (Unix)
        if: matrix.os != 'windows'
        shell: bash
        env:
          BUILD_TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          STAGE_DIR="dist/learn-${BUILD_TARGET}"
          mkdir -p "$STAGE_DIR/bin"
          BIN="target/${BUILD_TARGET}/release/learn"
          if [ ! -f "$BIN" ]; then
            echo "::error::Expected binary not found at $BIN"
            ls -la "target/${BUILD_TARGET}/release/" || true
            exit 1
          fi
          cp "$BIN" "$STAGE_DIR/bin/"
          [ -f .claude/skills/learn-rv/SKILL.md ] && cp .claude/skills/learn-rv/SKILL.md "$STAGE_DIR/" || true
          [ -f README.md ]      && cp README.md      "$STAGE_DIR/" || true
          [ -f LICENSE-MIT ]    && cp LICENSE-MIT    "$STAGE_DIR/" || true
          [ -f LICENSE-APACHE ] && cp LICENSE-APACHE "$STAGE_DIR/" || true
          # Generate install.sh — drops the skill folder into ~/.claude/skills/learn-rv/
          # and symlinks the binary into ~/.cargo/bin (or ~/.local/bin as fallback).
          cat > "$STAGE_DIR/install.sh" <<'INSTALL_EOF'
          #!/usr/bin/env bash
          set -euo pipefail
          HERE="$(cd "$(dirname "$0")" && pwd)"
          SKILL_DIR="$HOME/.claude/skills/learn-rv"
          mkdir -p "$SKILL_DIR/bin"
          cp "$HERE/SKILL.md" "$SKILL_DIR/SKILL.md"
          cp "$HERE/bin/learn" "$SKILL_DIR/bin/learn"
          chmod +x "$SKILL_DIR/bin/learn"
          # Symlink into PATH so `learn` works from any terminal.
          if [ -d "$HOME/.cargo/bin" ]; then
            ln -sf "$SKILL_DIR/bin/learn" "$HOME/.cargo/bin/learn"
            echo "Installed: $SKILL_DIR/SKILL.md and $HOME/.cargo/bin/learn"
          else
            mkdir -p "$HOME/.local/bin"
            ln -sf "$SKILL_DIR/bin/learn" "$HOME/.local/bin/learn"
            echo "Installed: $SKILL_DIR/SKILL.md and $HOME/.local/bin/learn"
            echo "Add ~/.local/bin to your PATH if not already."
          fi
          INSTALL_EOF
          chmod +x "$STAGE_DIR/install.sh"
          tar -czf "dist/learn-${BUILD_TARGET}.tar.gz" -C dist "learn-${BUILD_TARGET}"

      - name: Stage `learn` binary + skill (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        env:
          BUILD_TARGET: ${{ matrix.target }}
        run: |
          $stage = "dist/learn-$env:BUILD_TARGET"
          New-Item -ItemType Directory -Force -Path "$stage/bin" | Out-Null
          $bin = "target/$env:BUILD_TARGET/release/learn.exe"
          if (-not (Test-Path $bin)) {
            Write-Error "Expected binary not found at $bin"
            exit 1
          }
          Copy-Item $bin "$stage/bin/"
          if (Test-Path .claude/skills/learn-rv/SKILL.md) { Copy-Item .claude/skills/learn-rv/SKILL.md $stage }
          if (Test-Path README.md)      { Copy-Item README.md      $stage }
          if (Test-Path LICENSE-MIT)    { Copy-Item LICENSE-MIT    $stage }
          if (Test-Path LICENSE-APACHE) { Copy-Item LICENSE-APACHE $stage }
          Compress-Archive -Path $stage -DestinationPath "dist/learn-$env:BUILD_TARGET.zip" -Force

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: learn-${{ matrix.target }}
          path: dist/learn-${{ matrix.target }}.${{ matrix.archive_ext }}
          if-no-files-found: error
          retention-days: 30

  # -------------------------------------------------------------------------
  # Publish: collect every successful matrix artifact and publish them as
  # a single GitHub Release. Without this job the artifacts only exist in
  # Actions storage; users can't download from a stable URL like
  # /releases/latest/download/<file>.tar.gz.
  # -------------------------------------------------------------------------
  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    # Only publish on tag pushes, not workflow_dispatch
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          # Pulls every uploaded artifact directory under dist/
      - name: List artifacts
        run: |
          echo "Available artifacts:"
          find dist -type f \( -name '*.tar.gz' -o -name '*.zip' \) -print
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/**/*.tar.gz
            dist/**/*.zip
          fail_on_unmatched_files: false
          generate_release_notes: true
          draft: false
          prerelease: false
