name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  ci:
    name: CI (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest]

    steps:
      # checkout
      - name: Checkout
        uses: actions/checkout@v4

      # RuVector dependency: workspace path-depends on ../ruvector/crates/*.
      # Materialise it as a sibling shallow-clone before any cargo command.
      # ruvnet/RuVector is public (MIT); no token required.
      - name: Clone ruvnet/RuVector (sibling, public)
        shell: bash
        run: |
          git clone --depth 1 --branch main \
            https://github.com/ruvnet/RuVector.git \
            ../ruvector

      # toolchain
      - name: Install Rust toolchain (from rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.91.1"
          components: rustfmt, clippy, llvm-tools-preview

      # cache - cargo registry
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      # cache - target directory
      - name: Cache cargo target dir
        uses: actions/cache@v4
        with:
          path: target/
          key: ${{ runner.os }}-cargo-target-${{ hashFiles('**/Cargo.lock') }}-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-target-${{ hashFiles('**/Cargo.lock') }}-
            ${{ runner.os }}-cargo-target-

      # fmt-check
      - name: fmt-check
        run: cargo fmt --check

      # clippy
      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      # test (ignore-tagged tests excluded by default)
      - name: test
        run: cargo test --workspace

      # release build
      - name: build --release
        run: cargo build --release --workspace

      # install cargo-llvm-cov
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      # coverage report (informational — full workspace)
      # NOTE: a previous strict 80% threshold was dropped because the parser
      # was brittle (depended on an exact `TOTAL` line that varies across
      # cargo-llvm-cov versions) and the prior exclusion list (5 of 12 crates)
      # made the threshold itself vacuous-green. Re-add a real gate later
      # once a meaningful baseline is recorded against the full workspace.
      - name: Coverage report (informational)
        continue-on-error: true
        run: |
          cargo llvm-cov \
            --workspace \
            --text \
            --summary-only \
            2>&1 | tee coverage-summary.txt || true

      # upload coverage artifact for inspection
      - name: Upload coverage summary
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-summary
          path: coverage-summary.txt
          retention-days: 14
          if-no-files-found: warn
