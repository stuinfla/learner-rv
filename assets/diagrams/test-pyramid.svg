<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 540" width="620" height="540" role="img" aria-label="learn-rs quality discipline: six-level test pyramid from unit tests at the base to E2E smoke at the top, all gated in CI">
  <defs>
    <linearGradient id="grad-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fafbfc"/>
      <stop offset="100%" stop-color="#eef1f4"/>
    </linearGradient>
    <linearGradient id="grad-header" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#16607d"/>
      <stop offset="100%" stop-color="#072636"/>
    </linearGradient>
    <linearGradient id="grad-l6" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#16607d"/>
      <stop offset="100%" stop-color="#0a3a4d"/>
    </linearGradient>
    <linearGradient id="grad-l5" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1f7a87"/>
      <stop offset="100%" stop-color="#13556e"/>
    </linearGradient>
    <linearGradient id="grad-l4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3290a0"/>
      <stop offset="100%" stop-color="#1d6c80"/>
    </linearGradient>
    <linearGradient id="grad-l3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4ba6b5"/>
      <stop offset="100%" stop-color="#2e8497"/>
    </linearGradient>
    <linearGradient id="grad-l2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#65b9c5"/>
      <stop offset="100%" stop-color="#3f9aa9"/>
    </linearGradient>
    <linearGradient id="grad-l1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#84cad3"/>
      <stop offset="100%" stop-color="#5dafbb"/>
    </linearGradient>
    <radialGradient id="grad-badge" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#c89b3c"/>
      <stop offset="100%" stop-color="#8e6a1d"/>
    </radialGradient>
    <filter id="card-shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="2.5" flood-opacity="0.12"/>
    </filter>
    <filter id="hero-shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-opacity="0.18"/>
    </filter>
    <style>
      .header-h { font-family: -apple-system, system-ui, sans-serif; font-size: 14px; font-weight: 700; fill: #fafbfc; letter-spacing: 1.4px; }
      .badge-num { font-family: -apple-system, system-ui, sans-serif; font-size: 13px; font-weight: 700; fill: #fff; }
      .level-h { font-family: -apple-system, system-ui, sans-serif; font-size: 14px; font-weight: 700; fill: #fff; letter-spacing: 0.8px; }
      .level-tag { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 11px; fill: rgba(255,255,255,0.85); }
      .footnote { font-family: -apple-system, system-ui, sans-serif; font-size: 11.5px; fill: #4b5563; }
      .footnote-h { font-family: -apple-system, system-ui, sans-serif; font-size: 11.5px; fill: #1a1f2e; font-weight: 600; }
    </style>
  </defs>

  <rect width="620" height="540" fill="url(#grad-bg)"/>

  <!-- Header bar -->
  <g filter="url(#hero-shadow)">
    <rect x="20" y="20" width="580" height="44" rx="10" ry="10" fill="url(#grad-header)"/>
    <rect x="20" y="20" width="580" height="44" rx="10" ry="10" fill="none" stroke="#c89b3c" stroke-width="1.2" stroke-opacity="0.55"/>
    <text class="header-h" x="310" y="48" text-anchor="middle">QUALITY DISCIPLINE — SIX LEVELS, GATED IN CI</text>
  </g>

  <!-- Level 6 (top, narrowest) -->
  <g filter="url(#card-shadow)">
    <rect x="200" y="76" width="220" height="58" rx="6" ry="6" fill="url(#grad-l6)"/>
    <circle cx="226" cy="105" r="14" fill="url(#grad-badge)"/>
    <text class="badge-num" x="226" y="110" text-anchor="middle">6</text>
    <text class="level-h" x="310" y="100" text-anchor="middle">E2E smoke</text>
    <text class="level-tag" x="310" y="118" text-anchor="middle">real video → real KB</text>
  </g>

  <!-- Level 5 -->
  <g filter="url(#card-shadow)">
    <rect x="160" y="140" width="300" height="56" rx="6" ry="6" fill="url(#grad-l5)"/>
    <circle cx="186" cy="168" r="14" fill="url(#grad-badge)"/>
    <text class="badge-num" x="186" y="173" text-anchor="middle">5</text>
    <text class="level-h" x="310" y="163" text-anchor="middle">mutation tests</text>
    <text class="level-tag" x="310" y="181" text-anchor="middle">cargo-mutants on chunker · claim_id</text>
  </g>

  <!-- Level 4 -->
  <g filter="url(#card-shadow)">
    <rect x="120" y="202" width="380" height="56" rx="6" ry="6" fill="url(#grad-l4)"/>
    <circle cx="146" cy="230" r="14" fill="url(#grad-badge)"/>
    <text class="badge-num" x="146" y="235" text-anchor="middle">4</text>
    <text class="level-h" x="310" y="225" text-anchor="middle">fuzz</text>
    <text class="level-tag" x="310" y="243" text-anchor="middle">cargo-fuzz on VTT parser (untrusted input)</text>
  </g>

  <!-- Level 3 -->
  <g filter="url(#card-shadow)">
    <rect x="90" y="264" width="440" height="56" rx="6" ry="6" fill="url(#grad-l3)"/>
    <circle cx="116" cy="292" r="14" fill="url(#grad-badge)"/>
    <text class="badge-num" x="116" y="297" text-anchor="middle">3</text>
    <text class="level-h" x="310" y="287" text-anchor="middle">integration tests</text>
    <text class="level-tag" x="310" y="305" text-anchor="middle">workspace tests/ — cross-crate flows</text>
  </g>

  <!-- Level 2 -->
  <g filter="url(#card-shadow)">
    <rect x="60" y="326" width="500" height="56" rx="6" ry="6" fill="url(#grad-l2)"/>
    <circle cx="86" cy="354" r="14" fill="url(#grad-badge)"/>
    <text class="badge-num" x="86" y="359" text-anchor="middle">2</text>
    <text class="level-h" x="310" y="349" text-anchor="middle">property tests</text>
    <text class="level-tag" x="310" y="367" text-anchor="middle">proptest invariants · chunker · retriever</text>
  </g>

  <!-- Level 1 (base, widest) -->
  <g filter="url(#card-shadow)">
    <rect x="30" y="388" width="560" height="58" rx="6" ry="6" fill="url(#grad-l1)"/>
    <circle cx="56" cy="417" r="14" fill="url(#grad-badge)"/>
    <text class="badge-num" x="56" y="422" text-anchor="middle">1</text>
    <text class="level-h" x="310" y="411" text-anchor="middle">unit tests</text>
    <text class="level-tag" x="310" y="429" text-anchor="middle">cargo test --workspace · per-crate</text>
  </g>

  <!-- Footer -->
  <text class="footnote-h" x="310" y="478" text-anchor="middle">CI gate: fmt-check · clippy -D warnings · test --workspace · llvm-cov ≥ 80%</text>
  <text class="footnote" x="310" y="500" text-anchor="middle">Two Ruflo QA agents review each completed phase before the next begins.</text>
  <text class="footnote" x="310" y="520" text-anchor="middle">No commit lands with a red gate. Every level above is non-skippable on the path to elite.</text>
</svg>
