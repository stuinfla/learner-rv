<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 460" width="820" height="460" role="img" aria-label="learn-rs storage layout: per-topic .rvf files plus _graph and _meta sidecar directories under ~/Docs/KB">
  <defs>
    <linearGradient id="grad-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fafbfc"/>
      <stop offset="100%" stop-color="#eef1f4"/>
    </linearGradient>
    <linearGradient id="grad-header" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#16607d"/>
      <stop offset="100%" stop-color="#072636"/>
    </linearGradient>
    <linearGradient id="grad-tree" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f4f7fa"/>
    </linearGradient>
    <filter id="card-shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="2.5" flood-opacity="0.10"/>
    </filter>
    <filter id="hero-shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-opacity="0.18"/>
    </filter>
    <style>
      .header-h { font-family: -apple-system, system-ui, sans-serif; font-size: 15px; font-weight: 700; fill: #fafbfc; letter-spacing: 1.5px; }
      .header-tag { font-family: -apple-system, system-ui, sans-serif; font-size: 11.5px; fill: #c89b3c; letter-spacing: 1.3px; text-transform: uppercase; }
      .root { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 14px; font-weight: 700; fill: #1a1f2e; }
      .leaf { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 12.5px; fill: #1a1f2e; }
      .dir { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 12.5px; fill: #1a1f2e; font-weight: 600; }
      .annot { font-family: -apple-system, system-ui, sans-serif; font-size: 11px; fill: #6e7686; font-style: italic; }
      .tag-rvf { font-family: -apple-system, system-ui, sans-serif; font-size: 9.5px; font-weight: 700; fill: #fff; letter-spacing: 0.8px; }
      .tag-graph { font-family: -apple-system, system-ui, sans-serif; font-size: 9.5px; font-weight: 700; fill: #fff; letter-spacing: 0.8px; }
      .footnote { font-family: -apple-system, system-ui, sans-serif; font-size: 11.5px; fill: #4b5563; }
      .footnote-h { font-family: -apple-system, system-ui, sans-serif; font-size: 11.5px; fill: #1a1f2e; font-weight: 600; }
    </style>
  </defs>

  <rect width="820" height="460" fill="url(#grad-bg)"/>

  <!-- Header bar -->
  <g filter="url(#hero-shadow)">
    <rect x="20" y="20" width="780" height="48" rx="10" ry="10" fill="url(#grad-header)"/>
    <rect x="20" y="20" width="780" height="48" rx="10" ry="10" fill="none" stroke="#c89b3c" stroke-width="1.2" stroke-opacity="0.55"/>
    <text class="header-tag" x="40" y="42">⬢ RUVECTOR RVF</text>
    <text class="header-h" x="410" y="49" text-anchor="middle">STORAGE — ONE .rvf FILE PER TOPIC, FULLY ISOLATED</text>
  </g>

  <!-- Tree panel -->
  <g filter="url(#card-shadow)">
    <rect x="20" y="80" width="780" height="295" rx="12" ry="12" fill="url(#grad-tree)" stroke="#d6d9dd" stroke-width="1"/>

    <text class="root" x="42" y="110">~/Docs/KB/</text>

    <!-- .rvf files with badges -->
    <text class="leaf" x="62" y="138">├──  french-cooking.rvf</text>
    <rect x="290" y="124" width="40" height="17" rx="3" ry="3" fill="#16607d"/>
    <text class="tag-rvf" x="310" y="136" text-anchor="middle">RVF</text>
    <text class="annot" x="345" y="138">chunks · embeddings · HNSW · witness chain</text>

    <text class="leaf" x="62" y="162">├──  indexed-arbitrage.rvf</text>
    <rect x="290" y="148" width="40" height="17" rx="3" ry="3" fill="#16607d"/>
    <text class="tag-rvf" x="310" y="160" text-anchor="middle">RVF</text>
    <text class="annot" x="345" y="162">fully isolated — no shared state with other topics</text>

    <text class="leaf" x="62" y="186">├──  claude-skills.rvf</text>
    <rect x="290" y="172" width="40" height="17" rx="3" ry="3" fill="#16607d"/>
    <text class="tag-rvf" x="310" y="184" text-anchor="middle">RVF</text>

    <text class="dir" x="62" y="216">├──  _graph/</text>
    <text class="leaf" x="82" y="240">│      ├──  french-cooking.graphdb</text>
    <rect x="346" y="226" width="52" height="17" rx="3" ry="3" fill="#a06e1f"/>
    <text class="tag-graph" x="372" y="238" text-anchor="middle">GRAPH</text>
    <text class="annot" x="412" y="240">claims · entities · relations</text>

    <text class="leaf" x="82" y="261">│      ├──  indexed-arbitrage.graphdb</text>
    <text class="leaf" x="82" y="282">│      └──  claude-skills.graphdb</text>

    <text class="dir" x="62" y="306">├──  _meta/</text>
    <text class="leaf" x="82" y="328">│      └──  &lt;topic&gt;.json</text>
    <text class="annot" x="285" y="328">manifest: video_id → ingestion state</text>

    <text class="dir" x="62" y="352">└──  _raw/&lt;topic&gt;/</text>
    <text class="annot" x="225" y="352">cached source captions and metadata</text>
  </g>

  <!-- Footer notes -->
  <text class="footnote-h" x="40" y="402">Drop a topic by deleting one file.</text>
  <text class="footnote" x="225" y="402">Move it to another machine and it just works.</text>
  <text class="footnote-h" x="500" y="402">Append-only — never breaks.</text>

  <text class="footnote-h" x="40" y="426">Witness chain inside every .rvf</text>
  <text class="footnote" x="225" y="426">cryptographically anchors each chunk to its source URL — auditable citations.</text>

  <text class="footnote" x="40" y="448">No daemon · no Docker · no cloud · no service to babysit. The file IS the database.</text>
</svg>
