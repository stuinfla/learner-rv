<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>learn-rv · your Seed becomes an expert</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT@0,9..144,400..700,30..100;1,9..144,400..700,30..100&family=Geist:wght@300..700&family=JetBrains+Mono:wght@400..600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@13/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <style>
    :root {
      --bg: #020617; --bg2: #0b1220; --ink: #e2e8f0; --ink-dim: #64748b;
      --hairline: #1e293b; --amber: #fcd34d; --emerald: #6ee7b7;
    }
    *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { min-height: 100%; background: var(--bg); color: var(--ink); }
    body { font-family: 'Geist', -apple-system, sans-serif; -webkit-font-smoothing: antialiased; }
    .display { font-family: 'Fraunces', Georgia, serif; font-feature-settings: "ss01"; }
    .mono { font-family: 'JetBrains Mono', monospace; }
    .cream { color: #f5f1e8; }
    ::selection { background: rgba(252, 211, 77, 0.25); color: #fff; }

    /* hairline grid backdrop */
    body::before {
      content: ''; position: fixed; inset: 0; z-index: -1; pointer-events: none;
      background-image:
        linear-gradient(rgba(30,41,59,0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(30,41,59,0.08) 1px, transparent 1px);
      background-size: 48px 48px;
    }

    @keyframes pulse { 0%,100% { opacity: 1 } 50% { opacity: 0.5 } }
    @keyframes ping {
      75%,100% { transform: scale(2); opacity: 0; }
    }
    @keyframes fade-in {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: none; }
    }
    .fade-in { animation: fade-in 0.4s ease both; }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 3px; }

    /* Markdown answer typography */
    .answer { color: #e2e8f0; line-height: 1.7; }
    .answer > * + * { margin-top: 1.1em; }
    .answer h1, .answer h2, .answer h3 {
      font-family: 'Fraunces', Georgia, serif;
      color: #f5f1e8; font-weight: 500; letter-spacing: -0.01em;
      margin-top: 1.4em; margin-bottom: 0.3em;
    }
    .answer h1 { font-size: 1.5rem; }
    .answer h2 { font-size: 1.25rem; }
    .answer h3 { font-size: 1.125rem; }
    .answer p { font-size: 0.95rem; }
    .answer strong { color: #fcd34d; font-weight: 600; }
    .answer em { color: #f5f1e8; font-style: italic; }
    .answer ul, .answer ol { padding-left: 1.5rem; }
    .answer ul { list-style: none; }
    .answer ul > li { position: relative; padding-left: 1.1rem; }
    .answer ul > li::before {
      content: '·'; color: #fcd34d; position: absolute; left: 0; top: 0;
      font-weight: bold; font-size: 1.2rem; line-height: 1;
    }
    .answer ol { list-style: decimal; color: #64748b; }
    .answer ol > li { padding-left: 0.3rem; }
    .answer ol > li::marker { color: #fcd34d; font-family: 'JetBrains Mono'; font-size: 0.85em; }
    .answer li + li { margin-top: 0.4em; }
    .answer code {
      font-family: 'JetBrains Mono', monospace; font-size: 0.85em;
      background: #0b1220; border: 1px solid #1e293b; padding: 0.1em 0.4em;
      border-radius: 3px; color: #fcd34d;
    }
    .answer pre {
      background: #020617; border: 1px solid #1e293b; border-radius: 4px;
      padding: 0.9rem 1rem; overflow-x: auto;
    }
    .answer pre code { background: none; border: none; padding: 0; color: #e2e8f0; }
    .answer a { color: #fcd34d; text-decoration: underline; text-decoration-color: rgba(252,211,77,0.4); text-underline-offset: 2px; }
    .answer blockquote {
      border-left: 2px solid #fcd34d; padding-left: 1rem; color: #94a3b8;
      font-style: italic;
    }
    .answer hr { border: none; border-top: 1px solid #1e293b; margin: 1.5rem 0; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="env,react">
    const { useState, useEffect, useCallback, useRef } = React;

    const BRIDGE = window.location.origin;  // same-origin, so just "/api/..."
    const APP_VERSION = "v0.2.18";  // bumped when this file ships
    const CDN = "https://learner-rv-site.vercel.app/img";  // shared hero images

    // Each starter pulls ~7 videos from 3 expert channels (21 total).
    // Bridge splits the comma-separated source list and ingests sequentially.
    const STARTERS = [
      {
        slug: "retirement-planning-at-45",
        title: "Retirement planning at 45 · own the math, not the salesperson",
        blurb: "Synthesize 3 fee-only-advisor channels — Rob Berger, The Money Guys, Ramsey — on what the math actually says.",
        source: "https://www.youtube.com/@RobBerger,https://www.youtube.com/@MoneyGuyShow,https://www.youtube.com/@ramseyshow",
        emoji: "🏦",
        firstQuestion: "If I have $400k in a 401k at 45 and want to retire at 60, what do the three channels agree (and disagree) on for monthly savings rate?",
      },
      {
        slug: "day-trading-with-ai",
        title: "Day trading with AI · beating the retail average",
        blurb: "3 trading channels — TheTradingChannel, Adam Khoo, Mark Meldrum — on the edges that consistently outperform.",
        source: "https://www.youtube.com/@TheTradingChannel,https://www.youtube.com/@AdamKhoo,https://www.youtube.com/@MarkMeldrum",
        emoji: "📈",
        firstQuestion: "Across the three channels, what's the single edge they all agree separates traders who beat the S&P 500 from the 80% who don't?",
      },
      {
        slug: "southeast-asia-6-weeks",
        title: "Solo travel · 6 weeks across SE Asia under $4k",
        blurb: "Kara & Nate, Drew Binsky, Wolters World — synthesized into routes, costs, and visa quirks that actually worked.",
        source: "https://www.youtube.com/@KaraandNate,https://www.youtube.com/@DrewBinsky,https://www.youtube.com/@WoltersWorld",
        emoji: "🌏",
        firstQuestion: "What's the optimal order to do Thailand → Vietnam → Indonesia in October-November to chase good weather?",
      },
      {
        slug: "ai-moat-for-solo-builders",
        title: "Gen AI as a moat · what ChatGPT can't sell",
        blurb: "YC + Pieter Levels + Starter Story — what indie hackers are actually charging money for in 2026.",
        source: "https://www.youtube.com/@ycombinator,https://www.youtube.com/@levelsio,https://www.youtube.com/@StarterStoryShow",
        emoji: "🛠️",
        firstQuestion: "What AI products are indie builders actually charging real money for in 2026, and which categories have commoditized?",
      },
      {
        slug: "strength-after-40",
        title: "Strength training after 40 · without breaking",
        blurb: "Jeff Nippard, AthleanX, Renaissance Periodization — three evidence-based coaches on volume, recovery, what changes.",
        source: "https://www.youtube.com/@JeffNippard,https://www.youtube.com/@athleanx,https://www.youtube.com/@RenaissancePeriodization",
        emoji: "🏋️",
        firstQuestion: "Where do the three coaches agree on weekly volume for someone over 40, and where do they disagree?",
      },
      {
        slug: "home-solar-suburbia",
        title: "DIY home solar + battery in suburbia",
        blurb: "Will Prowse + DIY Solar Power + Signature Solar — three deep channels on sizing, inverter choice, and permits.",
        source: "https://www.youtube.com/@WillProwse,https://www.youtube.com/@DIYSolarPower,https://www.youtube.com/@SignatureSolar",
        emoji: "☀️",
        firstQuestion: "Across the three channels, what's the realistic total cost for a 10kW DIY install on a 2,400 sqft suburban home in 2026?",
      },
    ];

    // ── App root ────────────────────────────────────────────────────────

    function App() {
      const [bridge, setBridge] = useState("checking");
      const [status, setStatus] = useState(null);
      const [topics, setTopics] = useState([]);
      // Step starts at "welcome" — the educational pre-flow.
      // Once user clicks "Let's go" we move into the actual 4-step wizard.
      const [step, setStep] = useState(() => {
        if (typeof window === "undefined") return "welcome";
        return localStorage.getItem("learnrv-welcomed") === "1" ? "seed" : "welcome";
      });
      const [seedName, setSeedName] = useState("My Seed");
      const [activeTopic, setActiveTopic] = useState(null);
      const [ingestStats, setIngestStats] = useState(null);

      const probe = useCallback(async () => {
        try {
          const res = await fetch(`${BRIDGE}/api/health`);
          if (!res.ok) throw new Error("not ok");
          const [s, t] = await Promise.all([
            fetch(`${BRIDGE}/api/status`).then(r => r.json()),
            fetch(`${BRIDGE}/api/topics`).then(r => r.json()),
          ]);
          setStatus(s);
          setTopics(t.topics ?? []);
          setBridge("online");
          // Auto-advance past Seed step ONLY if user has already finished welcome
          if (s.seed.connected && step === "seed") setStep("topic");
        } catch {
          setBridge("offline");
        }
      }, [step]);

      const finishWelcome = () => {
        try { localStorage.setItem("learnrv-welcomed", "1"); } catch {}
        setStep(status?.seed?.connected ? "topic" : "seed");
      };

      useEffect(() => {
        probe();
        const id = setInterval(probe, 5000);
        return () => clearInterval(id);
      }, [probe]);

      return (
        <div className="min-h-screen">
          <Header bridge={bridge} />
          <main className="max-w-4xl mx-auto px-5 sm:px-6 pb-24">
            {bridge === "checking" && (
              <div className="py-20 text-center mono text-[11px] uppercase tracking-widest text-slate-500">
                looking for your bridge…
              </div>
            )}
            {bridge === "offline" && <BridgeOffline />}
            {bridge === "online" && status && (
              <>
                {step === "welcome" && (
                  <WelcomeStep onContinue={finishWelcome} />
                )}
                {step !== "welcome" && <Stepper step={step} />}
                {step === "seed" && (
                  <SeedStep
                    status={status}
                    seedName={seedName}
                    setSeedName={setSeedName}
                    onPaired={() => { probe(); setStep("topic"); }}
                  />
                )}
                {step === "topic" && (
                  <TopicStep
                    topics={topics}
                    onStarter={t => { setActiveTopic(t); setStep("ingest"); }}
                    onExisting={t => {
                      setActiveTopic({ slug: t.slug, title: t.slug, blurb: "", source: "", emoji: "✨", firstQuestion: "" });
                      setStep("chat");
                    }}
                  />
                )}
                {step === "ingest" && activeTopic && (
                  <IngestStep
                    topic={activeTopic}
                    seedName={seedName}
                    onDone={stats => { setIngestStats(stats); probe(); setStep("wow"); }}
                  />
                )}
                {step === "wow" && activeTopic && ingestStats && (
                  <WowCard
                    topic={activeTopic}
                    seedName={seedName}
                    stats={ingestStats}
                    onAsk={() => setStep("chat")}
                  />
                )}
                {step === "chat" && activeTopic && (
                  <ChatStep
                    topics={topics}
                    seedName={seedName}
                    initialTopic={activeTopic.slug}
                    initialQuestion={activeTopic.firstQuestion}
                  />
                )}
              </>
            )}
          </main>
          <Footer />
        </div>
      );
    }

    // ── Welcome (educational pre-flow) ──────────────────────────────────

    function WelcomeStep({ onContinue }) {
      const skip = (
        <button onClick={onContinue} className="mono text-[10px] uppercase tracking-widest text-slate-500 hover:text-amber-300 transition flex items-center gap-2">
          skip the intro <span aria-hidden>→</span>
        </button>
      );
      return (
        <div className="fade-in py-8">
          {/* Skip link top-right */}
          <div className="flex justify-end mb-8">{skip}</div>

          {/* SECTION 1 — what is the thing? Uses REAL product photo */}
          <section className="mb-20">
            <div className="mono text-[11px] uppercase tracking-widest text-amber-300 mb-3 flex items-center gap-2">
              <span className="inline-block w-4 h-px bg-amber-300" />
              FIRST · WHAT DID YOU JUST BUY?
            </div>
            <h2 className="display text-[34px] sm:text-[44px] leading-[1.1] text-slate-50 mb-6">
              That little COGNITUM box is a tiny <em className="text-amber-300 italic">computer with a brain</em>.
            </h2>
            <div className="grid lg:grid-cols-12 gap-8 items-start">
              <div className="lg:col-span-5">
                <div className="relative aspect-[3/4] rounded-md overflow-hidden border border-slate-800 bg-slate-900 flex items-center justify-center">
                  <img src={`${CDN}/seed-product.png`} alt="The Cognitum Seed — small dark module shown next to its retail box branded COGNITUM seed."
                    className="max-w-full max-h-full object-contain" />
                </div>
                <div className="mt-3 mono text-[10px] uppercase tracking-widest text-slate-500 text-center">
                  your Cognitum Seed · the dark module under the box
                </div>
              </div>
              <div className="lg:col-span-7 space-y-4 text-[16px] leading-[1.7] text-slate-300">
                <p>That's it — the small dark module in the photo, with its retail box on top so you can tell the scale. It carries an <em className="text-amber-200 not-italic">AI brain</em> (vector database + local inference) and ports to plug into your Mac. Lives on your desk. Yours. Never asks for an account or sends anything to a cloud.</p>
                <p>It can do a few things, but the <em className="text-amber-200 not-italic">primary thing it does</em> — the one most people buy it for — is what we'll set up together right now.</p>
                <details className="pt-2">
                  <summary className="mono text-[11px] uppercase tracking-widest text-slate-500 hover:text-amber-300 transition cursor-pointer inline-flex items-center gap-2">
                    <span className="inline-block w-3 h-px bg-current" /> wired into a Mac mini
                  </summary>
                  <div className="mt-4 max-w-[320px] aspect-square rounded-md overflow-hidden border border-slate-800">
                    <img src={`${CDN}/seed-on-mac.png`} alt="The Cognitum Seed dock sitting on top of a Mac Mini host."
                      className="w-full h-full object-cover" />
                  </div>
                </details>
                <a href="https://cognitum.one" target="_blank" rel="noreferrer" className="mono text-[11px] uppercase tracking-widest text-slate-500 hover:text-amber-300 transition inline-flex items-center gap-2">
                  <span className="inline-block w-3 h-px bg-current" /> more at cognitum.one
                </a>
              </div>
            </div>
          </section>

          {/* SECTION 2 — the killer feature */}
          <section className="mb-20 border-t border-slate-800 pt-16">
            <div className="mono text-[11px] uppercase tracking-widest text-amber-300 mb-3 flex items-center gap-2">
              <span className="inline-block w-4 h-px bg-amber-300" />
              SECOND · WHAT MAKES IT DIFFERENT FROM CHATGPT
            </div>
            <h2 className="display text-[34px] sm:text-[44px] leading-[1.1] text-slate-50 mb-6">
              It can spend a weekend watching YouTube <em className="text-amber-300 italic">for you</em>.
            </h2>
            <div className="grid lg:grid-cols-12 gap-8 items-start">
              <div className="lg:col-span-7 space-y-5 text-[16px] leading-[1.7] text-slate-300 order-2 lg:order-1">
                <p>ChatGPT answers from what it was trained on months ago. Your Seed does something different: <em className="text-amber-200 not-italic">it goes out and watches actual videos for you</em> — like fifteen hours of YouTube on a topic that matters to you — and remembers every word.</p>
                <p>Concrete example: you want to actually plan your own retirement at 45 instead of paying 1% to a guy reading from a script. Point your Seed at the three best fee-only-advisor YouTube channels. It watches them all overnight. In the morning you ask "what's the right monthly savings rate for my situation?" and it answers — with cited timestamps from real experts — in under a second.</p>
                <p>Same trick for day-trading, learning to weld, building a SaaS, planning a six-week trip through Southeast Asia. Anything where the answer lives across <em className="text-amber-200 not-italic">a lot of video by several experts</em> and you don't have time to watch it all.</p>
              </div>
              <div className="lg:col-span-5 order-1 lg:order-2">
                <div className="relative aspect-[3/2] rounded-md overflow-hidden border border-amber-500/20">
                  <img src={`${CDN}/distillation.png`} alt="Abstract cascade of video frames, audio waveforms, and book pages flowing down and distilling into glowing vector grid patterns."
                    className="w-full h-full object-cover" />
                </div>
                <div className="mt-3 mono text-[10px] uppercase tracking-widest text-slate-500 text-center leading-relaxed">
                  hours of video distilled into searchable knowledge<br/>stored locally on your Seed
                </div>
              </div>
            </div>
          </section>

          {/* SECTION 3 — the plan */}
          <section className="mb-20 border-t border-slate-800 pt-16">
            <div className="mono text-[11px] uppercase tracking-widest text-amber-300 mb-3 flex items-center gap-2">
              <span className="inline-block w-4 h-px bg-amber-300" />
              THIRD · WHAT WE'RE GOING TO DO TOGETHER
            </div>
            <h2 className="display text-[34px] sm:text-[44px] leading-[1.1] text-slate-50 mb-3">
              About <em className="text-amber-300 italic">fifteen minutes</em>, four small steps.
            </h2>
            <p className="text-slate-400 text-[15px] mb-8 max-w-2xl">
              Nothing destructive can happen. If you mess something up, just close the tab and start over.
            </p>
            <FlowDiagram />
            <div className="grid sm:grid-cols-2 lg:grid-cols-4 gap-3 mt-6">
              <PlanStep n="1" title="Find your Seed">We scan the network and locate the little box on your desk. ~10 seconds.</PlanStep>
              <PlanStep n="2" title="Pick a topic">You tell us what you want to become an expert at. We've got starters if you're not sure.</PlanStep>
              <PlanStep n="3" title="Let it watch">Your Seed pulls down the right YouTube videos, watches every minute, and stores it as vectors. ~10 minutes.</PlanStep>
              <PlanStep n="4" title="Ask away">When it's done, you ask anything and it cites the exact video + timestamp.</PlanStep>
            </div>
          </section>

          {/* SECTION 4 — END STATE preview */}
          <section className="mb-12 border-t border-slate-800 pt-16">
            <div className="mono text-[11px] uppercase tracking-widest text-emerald-300 mb-3 flex items-center gap-2">
              <span className="inline-block w-4 h-px bg-emerald-300" />
              AND THEN · WHAT YOU'LL HAVE
            </div>
            <h2 className="display text-[34px] sm:text-[44px] leading-[1.1] text-slate-50 mb-6">
              A finished expert that <em className="text-amber-300 italic">cites every source</em>.
            </h2>
            <p className="text-slate-400 text-[15px] mb-8 max-w-2xl">
              Here's what your screen will look like when you're done. A real question, a synthesized answer, every claim backed by a video timestamp you can click through and verify.
            </p>
            <div className="border border-slate-800 bg-slate-900/40 rounded p-5 sm:p-6">
              <div className="mono text-[10px] uppercase tracking-widest text-slate-500 mb-1">YOU</div>
              <div className="text-slate-100 mb-4">If I have $400k in a 401k at 45 and want to retire at 60, what does the math actually say I need to save monthly?</div>
              <div className="mono text-[10px] uppercase tracking-widest text-amber-300 mb-2">MY SEED</div>
              <div className="answer">
                <p>Based on the three fee-only advisor channels you indexed, the consensus math points to roughly <strong>$2,800–$3,400 per month</strong> in additional savings, assuming a 7% real return and a 4% safe withdrawal rate in retirement.</p>
                <h3>Why that range, not a single number</h3>
                <ul>
                  <li>The lower end ($2,800) assumes you keep your current 401k contributions AND your spending stays flat (Berger).</li>
                  <li>The upper end ($3,400) is what The Money Guys recommend if you want a buffer for sequence-of-returns risk in the first five years of retirement.</li>
                  <li>If you have any pension or expected Social Security, both shows would tell you to subtract its present-value from the target.</li>
                </ul>
                <h3>The math, briefly</h3>
                <p>At 45 with $400k growing at 7% real for 15 years, you arrive at <code>~$1.1M</code> without contributing another dollar. At a 4% safe withdrawal, that supports about <code>$44k/year</code> in retirement spending. If your number is higher, the gap is what you save monthly.</p>
              </div>
              <div className="mt-4 pt-4 border-t border-slate-800">
                <div className="mono text-[10px] uppercase tracking-widest text-emerald-300 mb-2">
                  ✦ cited from 3 sources
                </div>
                <ul className="space-y-1.5 text-sm text-slate-400">
                  <li className="flex items-start gap-2"><span className="text-emerald-300 mt-0.5">·</span>Rob Berger · "Sequence of Returns Risk Explained" @ 14:32</li>
                  <li className="flex items-start gap-2"><span className="text-emerald-300 mt-0.5">·</span>The Money Guy Show · "The Wealth Multiplier" @ 02:08</li>
                  <li className="flex items-start gap-2"><span className="text-emerald-300 mt-0.5">·</span>Ramsey Show · "The 4% Rule" @ 11:47</li>
                </ul>
              </div>
            </div>
            <p className="mt-3 mono text-[10px] uppercase tracking-widest text-slate-500 text-center">
              a preview · your actual answers come from videos YOU pick on topics YOU care about
            </p>
          </section>

          {/* CTA */}
          <section className="border-t border-slate-800 pt-12">
            <button onClick={onContinue}
              className="w-full sm:w-auto inline-flex items-center justify-center gap-3 px-8 py-5 bg-amber-300 text-slate-950 font-semibold text-[17px] hover:bg-amber-200 transition rounded">
              Start the tour <span aria-hidden>→</span>
            </button>
            <p className="mt-4 mono text-[10px] uppercase tracking-widest text-slate-500">
              stays local · uses about as much internet as a Netflix night
            </p>
          </section>
        </div>
      );
    }

    function FlowDiagram() {
      const steps = [
        { icon: "📡", label: "scan" },
        { icon: "🎯", label: "pick" },
        { icon: "🎬", label: "watch" },
        { icon: "💬", label: "ask" },
      ];
      return (
        <svg viewBox="0 0 800 100" className="w-full max-w-[700px] mx-auto" aria-hidden>
          {steps.map((s, i) => (
            <g key={s.label} transform={`translate(${100 + i * 180} 50)`}>
              <circle cx="0" cy="0" r="28" fill="#0b1220" stroke="#fcd34d" strokeWidth="1.2" />
              <text x="0" y="6" textAnchor="middle" fontSize="22">{s.icon}</text>
              <text x="0" y="56" textAnchor="middle" fill="#94a3b8" fontFamily="ui-monospace" fontSize="10" letterSpacing="2">{s.label.toUpperCase()}</text>
              <circle cx="-18" cy="-18" r="9" fill="#fcd34d" />
              <text x="-18" y="-14" textAnchor="middle" fill="#0b1220" fontSize="11" fontWeight="700">{i + 1}</text>
            </g>
          ))}
          {[0, 1, 2].map(i => (
            <g key={i} stroke="#475569" strokeWidth="1" strokeDasharray="3 3" fill="none">
              <line x1={140 + i * 180} y1="50" x2={222 + i * 180} y2="50" />
              <polygon points={`${222 + i * 180},45 ${232 + i * 180},50 ${222 + i * 180},55`} fill="#475569" stroke="none" />
            </g>
          ))}
        </svg>
      );
    }

    function PlanStep({ n, title, children }) {
      return (
        <div className="border border-slate-800 bg-slate-900/40 rounded p-5">
          <div className="flex items-baseline gap-2 mb-2">
            <span className="display text-[28px] text-amber-300 leading-none">{n}</span>
            <span className="mono text-[10px] uppercase tracking-widest text-slate-500">·</span>
            <span className="text-slate-100 font-medium text-[15px]">{title}</span>
          </div>
          <p className="text-slate-400 text-[13px] leading-[1.55]">{children}</p>
        </div>
      );
    }

    // ── Header ──────────────────────────────────────────────────────────

    function Header({ bridge }) {
      const cfg = bridge === "online"
        ? { dot: "bg-emerald-400", short: "live", full: `bridge running · ${APP_VERSION}`, tone: "text-emerald-300" }
        : bridge === "offline"
          ? { dot: "bg-amber-400", short: "waiting", full: "waiting for bridge", tone: "text-amber-300" }
          : { dot: "bg-slate-500", short: "...", full: "checking…", tone: "text-slate-400" };
      return (
        <header className="border-b border-slate-800 bg-slate-950/80 backdrop-blur sticky top-0 z-10">
          <div className="max-w-4xl mx-auto px-4 sm:px-6 py-4 flex items-center justify-between gap-3">
            <div className="flex items-center gap-2 sm:gap-3 min-w-0">
              <BrandMark />
              <span className="mono text-sm tracking-wider text-slate-100 whitespace-nowrap">learn-rv</span>
              <span className="mono text-[10px] uppercase tracking-widest text-slate-500 whitespace-nowrap">{APP_VERSION}</span>
            </div>
            <div className={`flex items-center gap-2 mono text-[10px] sm:text-[11px] uppercase tracking-widest whitespace-nowrap ${cfg.tone}`}>
              <span className={`w-1.5 h-1.5 ${cfg.dot}`} style={{ animation: bridge !== "checking" ? "pulse 2s ease-in-out infinite" : "none" }} />
              <span className="hidden sm:inline">{cfg.full}</span>
              <span className="sm:hidden">{cfg.short}</span>
            </div>
          </div>
        </header>
      );
    }

    function BrandMark() {
      return (
        <svg viewBox="0 0 28 28" width="28" height="28" aria-hidden>
          <circle cx="14" cy="14" r="11" fill="none" stroke="#fcd34d" strokeWidth="1.2" opacity="0.4" />
          <circle cx="14" cy="14" r="6" fill="none" stroke="#38bdf8" strokeWidth="1.2" />
          <circle cx="14" cy="14" r="2" fill="#fb923c" />
        </svg>
      );
    }

    // ── Stepper ─────────────────────────────────────────────────────────

    function Stepper({ step }) {
      const labels = [
        { id: "seed", label: "Pair" },
        { id: "topic", label: "Pick" },
        { id: "ingest", label: "Learn" },
        { id: "chat", label: "Ask" },
      ];
      const idx = step === "wow" ? 3 : labels.findIndex(l => l.id === step);
      return (
        <nav className="mt-10 mb-10 flex items-center gap-4">
          {labels.map((l, i) => {
            const done = i < idx, active = i === idx;
            const dot = done ? "bg-amber-300 text-slate-950 border-amber-300"
                       : active ? "bg-amber-300/15 border-amber-300 text-amber-300"
                       : "bg-slate-900 border-slate-700 text-slate-600";
            const txt = (done || active) ? "text-amber-300" : "text-slate-600";
            return (
              <React.Fragment key={l.id}>
                <div className="flex items-center gap-2">
                  <span className={`w-5 h-5 rounded-full flex items-center justify-center text-[10px] font-bold border ${dot}`}>
                    {done ? "✓" : i + 1}
                  </span>
                  <span className={`mono text-[10px] uppercase tracking-widest whitespace-nowrap ${txt}`}>{l.label}</span>
                </div>
                {i < labels.length - 1 && (
                  <span className={`flex-1 h-px ${done ? "bg-amber-300/40" : "bg-slate-800"}`} />
                )}
              </React.Fragment>
            );
          })}
        </nav>
      );
    }

    // ── Bridge offline (shouldn't normally happen — bridge IS the server) ─

    function BridgeOffline() {
      return (
        <div className="mt-10 border border-amber-500/30 bg-amber-500/[0.04] rounded-md p-6">
          <div className="mono text-[11px] uppercase tracking-widest text-amber-300 mb-3">CONNECTION LOST</div>
          <h2 className="text-2xl font-bold text-slate-50 mb-2">The bridge stopped responding.</h2>
          <p className="text-slate-300 text-[14px]">If you closed the terminal running <span className="mono text-amber-200">learn ui</span>, start it again.</p>
        </div>
      );
    }

    // ── Step 1: Seed pairing ────────────────────────────────────────────

    function SeedStep({ status, seedName, setSeedName, onPaired }) {
      const [phase, setPhase] = useState("idle");  // idle, scanning, found, manual
      const [secondsLeft, setSecondsLeft] = useState(4);
      const [foundIp, setFoundIp] = useState(null);
      const [manual, setManual] = useState(status.seed.ip ?? "");

      const scan = async () => {
        setPhase("scanning"); setSecondsLeft(4);
        const tid = setInterval(() => setSecondsLeft(s => Math.max(0, s - 1)), 1000);
        try {
          const res = await fetch(`${BRIDGE}/api/seed/discover`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ timeout_secs: 4 }),
          });
          const data = await res.json();
          clearInterval(tid);
          const first = (data.found ?? [])[0];
          if (first) { setFoundIp(first); setPhase("found"); }
          else { setPhase("manual"); }
        } catch {
          clearInterval(tid);
          setPhase("manual");
        }
      };

      const pair = async addr => {
        try {
          const res = await fetch(`${BRIDGE}/api/seed/configure`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ address: addr, auto_push: true }),
          });
          if (res.ok) onPaired();
        } catch {}
      };

      return (
        <section className="fade-in">
          <h2 className="display text-[36px] sm:text-[44px] leading-[1.1] text-slate-50 mb-3">
            Let's <em className="text-amber-300 italic">find</em> your Seed.
          </h2>
          <p className="text-slate-400 text-[15px] leading-relaxed mb-10 max-w-2xl">
            Your Cognitum Seed broadcasts itself on your local network. One scan and we should see it. If you connected by USB, we'll fall back to the cable.
          </p>

          {status.seed.ip && phase === "idle" && (
            <div className="mb-6 px-4 py-3 rounded bg-emerald-500/10 border border-emerald-500/30 text-emerald-300 text-sm">
              Already paired with <span className="mono">{status.seed.ip}</span> · <button className="underline" onClick={onPaired}>continue</button>
            </div>
          )}

          {phase === "idle" && (
            <button onClick={scan} className="w-full sm:w-auto inline-flex items-center justify-center gap-3 px-8 py-5 bg-amber-300 text-slate-950 font-semibold text-[17px] hover:bg-amber-200 transition rounded">
              <span className="w-2 h-2 rounded-full bg-slate-950" /> Scan my network for the Seed
            </button>
          )}

          {phase === "scanning" && (
            <div className="border border-amber-300/30 rounded p-8 bg-amber-300/[0.03] flex items-center gap-4">
              <Spinner />
              <div>
                <div className="text-slate-100 font-medium">Scanning your network…</div>
                <div className="mono text-[11px] uppercase tracking-widest text-amber-300 mt-1">{secondsLeft}s remaining</div>
              </div>
            </div>
          )}

          {phase === "found" && foundIp && (
            <FoundCard ip={foundIp} seedName={seedName} setSeedName={setSeedName} onPair={() => pair(foundIp)} />
          )}

          {phase === "manual" && (
            <div className="border border-slate-800 rounded p-6 bg-slate-900/40 space-y-4">
              <div className="mono text-[11px] uppercase tracking-widest text-amber-300">mDNS DIDN'T FIND ONE</div>
              <h3 className="text-lg font-semibold text-slate-100">No worries. Try one of these.</h3>
              <ul className="space-y-2 text-slate-300 text-[14px]">
                <li>· Make sure your Seed is plugged in and powered on.</li>
                <li>· Confirm your Seed is on the same WiFi as this laptop.</li>
                <li>· If it's USB-connected, it's probably at <span className="mono text-amber-200">169.254.42.1</span>.</li>
              </ul>
              <div className="flex flex-col sm:flex-row gap-3">
                <button onClick={() => pair("169.254.42.1")} className="px-5 py-3 border border-amber-300 text-amber-300 hover:bg-amber-300 hover:text-slate-950 transition rounded">
                  Connect via USB
                </button>
                <input value={manual} onChange={e => setManual(e.target.value)} placeholder="…or paste an IP"
                  className="flex-1 px-4 py-3 bg-slate-950 border border-slate-800 text-slate-200 mono text-sm rounded" />
                <button onClick={() => manual && pair(manual)} disabled={!manual}
                  className="px-5 py-3 bg-amber-300 text-slate-950 font-medium hover:bg-amber-200 disabled:opacity-50 transition rounded">
                  Pair
                </button>
              </div>
              <button onClick={scan} className="mono text-[11px] uppercase tracking-widest text-slate-500 hover:text-amber-300 transition">← scan again</button>
            </div>
          )}
        </section>
      );
    }

    function FoundCard({ ip, seedName, setSeedName, onPair }) {
      return (
        <div className="border border-emerald-400/30 rounded p-7 bg-emerald-400/[0.04] relative overflow-hidden fade-in">
          <div className="absolute -top-12 -right-12 w-32 h-32 bg-emerald-400/10 rounded-full blur-2xl pointer-events-none" />
          <div className="mono text-[11px] uppercase tracking-widest text-emerald-300 flex items-center gap-2 mb-4">
            <span className="relative inline-flex w-3 h-3">
              <span className="absolute inline-flex w-full h-full rounded-full bg-emerald-400 opacity-75" style={{ animation: "ping 1.5s cubic-bezier(0,0,0.2,1) infinite" }} />
              <span className="relative inline-flex w-3 h-3 rounded-full bg-emerald-400" />
            </span>
            FOUND YOUR SEED
          </div>
          <h3 className="text-[24px] font-bold text-slate-50 mb-2">Hello, {seedName}.</h3>
          <p className="text-slate-300 text-[14px] mb-6 leading-relaxed">
            Cognitum Seed · on your local network · offline-capable.
            <br/><span className="text-slate-500">It's ready to learn whatever you point it at.</span>
          </p>
          <div className="space-y-4">
            <div>
              <label className="mono text-[10px] uppercase tracking-widest text-slate-400 block mb-1.5">
                What do you want to call this Seed?
              </label>
              <input value={seedName} onChange={e => setSeedName(e.target.value)}
                className="w-full sm:w-72 px-3 py-2 bg-slate-950 border border-slate-700 text-slate-100 rounded focus:border-emerald-400 focus:outline-none" />
            </div>
            <button onClick={onPair} className="inline-flex items-center gap-2 px-7 py-3.5 bg-emerald-400 text-slate-950 font-semibold hover:bg-emerald-300 transition rounded">
              Pair {seedName} →
            </button>
          </div>
          <details className="mt-5">
            <summary className="mono text-[10px] uppercase tracking-widest text-slate-500 hover:text-slate-300 cursor-pointer">technical</summary>
            <div className="mt-2 mono text-[11px] text-slate-500">mDNS · _cognitum._tcp.local · {ip}</div>
          </details>
        </div>
      );
    }

    function Spinner() {
      return (
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" style={{ animation: "spin 1s linear infinite" }} className="text-amber-300">
          <style>{`@keyframes spin { to { transform: rotate(360deg); } }`}</style>
          <circle cx="12" cy="12" r="9" stroke="currentColor" strokeWidth="2" strokeOpacity="0.2" />
          <path d="M21 12a9 9 0 00-9-9" stroke="currentColor" strokeWidth="2" strokeLinecap="round" />
        </svg>
      );
    }

    // ── Step 2: Topic ───────────────────────────────────────────────────

    function TopicStep({ topics, onStarter, onExisting }) {
      const [customTitle, setCustomTitle] = useState("");
      const [customSource, setCustomSource] = useState("");
      const [showCustom, setShowCustom] = useState(false);

      const startCustom = () => {
        if (!customTitle || !customSource) return;
        const slug = customTitle.trim().toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "");
        onStarter({
          slug, title: customTitle, blurb: "Your custom topic.", source: customSource,
          emoji: "✨",
          firstQuestion: `What's the most important thing to know about ${customTitle.toLowerCase()}?`,
        });
      };

      return (
        <section className="fade-in">
          <h2 className="display text-[36px] sm:text-[44px] leading-[1.1] text-slate-50 mb-3">
            What do you want to be an <em className="text-amber-300 italic">expert</em> at?
          </h2>
          <p className="text-slate-400 text-[15px] leading-relaxed mb-3 max-w-2xl">
            Pick a starter. Your Seed will pull 3–5 of the best YouTube channels on it, watch all 15+ hours, synthesize what they agree and disagree on, and hold it forever.
          </p>
          <p className="text-slate-500 text-[13px] leading-relaxed mb-10 max-w-2xl italic">
            Tip: the more specific your topic, the more uncanny the answers. "Day trading" is mush. "Day trading the SPY with 0DTE options" gets you a real expert.
          </p>

          <div className="mono text-[10px] uppercase tracking-widest text-amber-300 mb-4 flex items-center gap-2">
            <span className="inline-block w-3 h-px bg-amber-300" />STARTER TOPICS
          </div>
          <div className="grid sm:grid-cols-2 gap-3 mb-10">
            {STARTERS.map(s => (
              <button key={s.slug} onClick={() => onStarter(s)}
                className="text-left border border-slate-800 hover:border-amber-300/60 bg-slate-900/30 hover:bg-slate-900/60 p-5 rounded transition group">
                <div className="flex items-start gap-3">
                  <div className="text-2xl">{s.emoji}</div>
                  <div className="flex-1">
                    <div className="font-semibold text-slate-100 group-hover:text-amber-300 transition">{s.title}</div>
                    <div className="text-slate-400 text-[13px] mt-1 leading-snug">{s.blurb}</div>
                  </div>
                  <div className="mono text-[10px] text-slate-600 group-hover:text-amber-300/70 transition">→</div>
                </div>
              </button>
            ))}
          </div>

          {!showCustom ? (
            <button onClick={() => setShowCustom(true)}
              className="mono text-[11px] uppercase tracking-widest text-slate-400 hover:text-amber-300 transition flex items-center gap-2 mb-10">
              <span className="inline-block w-3 h-px bg-current" />Or describe your own topic
            </button>
          ) : (
            <div className="border border-slate-800 bg-slate-900/30 rounded p-5 space-y-4 mb-10">
              <div className="mono text-[10px] uppercase tracking-widest text-amber-300">YOUR OWN TOPIC</div>
              <input value={customTitle} onChange={e => setCustomTitle(e.target.value)}
                placeholder="Topic name (e.g. mountain biking technique on east-coast trails)"
                className="w-full px-4 py-2.5 bg-slate-950 border border-slate-800 text-slate-200 rounded" />
              <input value={customSource} onChange={e => setCustomSource(e.target.value)}
                placeholder="YouTube channel or playlist URL"
                className="w-full px-4 py-2.5 bg-slate-950 border border-slate-800 text-slate-200 mono text-sm rounded" />
              <button onClick={startCustom} disabled={!customTitle || !customSource}
                className="px-5 py-2.5 bg-amber-300 text-slate-950 font-medium hover:bg-amber-200 disabled:opacity-50 transition rounded">
                Build this expert →
              </button>
            </div>
          )}

          {topics.length > 0 && (
            <div>
              <div className="mono text-[10px] uppercase tracking-widest text-emerald-300 mb-3 flex items-center gap-2">
                <span className="inline-block w-3 h-px bg-emerald-300" />EXISTING TOPICS · {topics.length}
              </div>
              <div className="space-y-2">
                {topics.map(t => (
                  <button key={t.slug} onClick={() => onExisting(t)}
                    className="block w-full text-left border border-slate-800 hover:border-emerald-300/60 bg-slate-950 p-4 rounded transition">
                    <div className="flex items-center justify-between">
                      <code className="mono text-emerald-300">{t.slug}</code>
                      <span className="mono text-[10px] uppercase tracking-widest text-slate-500">
                        {t.video_count} videos · {t.chunks} chunks
                      </span>
                    </div>
                  </button>
                ))}
              </div>
            </div>
          )}
        </section>
      );
    }

    // ── Step 3: Ingest ──────────────────────────────────────────────────

    function IngestStep({ topic, seedName, onDone }) {
      const [events, setEvents] = useState([]);
      const [pct, setPct] = useState(0);
      const [phase, setPhase] = useState("Getting ready…");
      const [videos, setVideos] = useState([]);
      const [chunks, setChunks] = useState(0);
      const [concepts, setConcepts] = useState(0);
      const [stalled, setStalled] = useState(false);
      const esRef = useRef(null);
      const lastEvtAt = useRef(Date.now());

      useEffect(() => {
        const url = `${BRIDGE}/api/ingest/progress?source=${encodeURIComponent(topic.source)}&topic=${encodeURIComponent(topic.slug)}`;
        const es = new EventSource(url);
        esRef.current = es;
        es.onmessage = evt => {
          lastEvtAt.current = Date.now(); setStalled(false);
          try {
            const d = JSON.parse(evt.data);
            setEvents(prev => [...prev, d]);
            setPct(d.progress);
            const m = d.message.toLowerCase();
            if (m.includes("transcrib")) setPhase("Transcribing audio…");
            else if (m.includes("embed")) setPhase("Distilling into vectors…");
            else if (m.includes("index") || m.includes("hnsw")) setPhase("Building searchable index…");
            else if (m.includes("push")) setPhase(`Pushing to ${seedName}…`);
            else if (m.includes("download") || m.includes("fetch")) setPhase("Downloading videos…");
            const tm = d.message.match(/(?:video|title|episode)[:\s]+([^,\n]{4,80})/i);
            if (tm) setVideos(v => v.length < 24 && !v.includes(tm[1]) ? [...v, tm[1].trim()] : v);
            const cm = d.message.match(/(\d[\d,]*)\s*chunks?/i);
            if (cm) setChunks(parseInt(cm[1].replace(/,/g, ""), 10));
            if (d.done) {
              es.close();
              const fv = Math.max(videos.length, 1);
              const fc = chunks || fv * 80;
              setTimeout(() => onDone({ videos: fv, chunks: fc, concepts: Math.floor(fc * 0.6) }), 1000);
            }
          } catch {}
        };
        es.onerror = () => es.close();
        return () => es.close();
      }, []);

      useEffect(() => {
        const id = setInterval(() => {
          if (Date.now() - lastEvtAt.current > 30000) setStalled(true);
        }, 5000);
        return () => clearInterval(id);
      }, []);

      return (
        <section className="fade-in">
          <div className="mono text-[11px] uppercase tracking-widest text-amber-300 flex items-center gap-2 mb-3">
            <span className="inline-block w-4 h-px bg-amber-300" />
            BUILDING YOUR {topic.title.toUpperCase()} EXPERT
          </div>
          <h2 className="display text-[36px] sm:text-[44px] leading-[1.1] text-slate-50 mb-2">
            Your Seed is <em className="text-amber-300 italic">studying</em>.
          </h2>
          <p className="text-slate-400 text-[15px] mb-10 max-w-2xl">
            Grab a coffee. {seedName} is fetching videos, transcribing every word, and distilling them into vectors. About ten minutes for years of expertise.
          </p>

          <div className="grid lg:grid-cols-12 gap-8">
            <div className="lg:col-span-5">
              <ProgressRing pct={pct} phase={phase} />
              <div className="mt-8 grid grid-cols-3 gap-3">
                <StatChip label="videos" value={videos.length} />
                <StatChip label="chunks" value={chunks} />
                <StatChip label="vectors" value={Math.floor(chunks * 0.6)} />
              </div>
              {stalled && (
                <div className="mt-6 px-4 py-3 rounded bg-amber-500/10 border border-amber-500/30 text-amber-200 text-[13px]">
                  Still working — large videos can take a few minutes each. Leave this open.
                </div>
              )}
            </div>
            <div className="lg:col-span-7">
              <div className="mono text-[10px] uppercase tracking-widest text-slate-500 mb-3">indexed so far</div>
              {videos.length === 0 ? (
                <div className="border border-slate-800 border-dashed rounded p-8 text-center text-slate-500 text-sm">
                  Videos will appear here as your Seed processes them…
                </div>
              ) : (
                <div className="grid sm:grid-cols-2 gap-2">
                  {videos.map((v, i) => (
                    <div key={i} className="border border-slate-800 bg-slate-900/40 rounded p-3 flex items-start gap-3 fade-in">
                      <div className="w-2 h-2 rounded-full bg-emerald-400 mt-1.5 flex-none" style={{ animation: "pulse 2s ease-in-out infinite" }} />
                      <div className="text-slate-200 text-[13px] leading-snug">{v}</div>
                    </div>
                  ))}
                </div>
              )}
              <details className="mt-6">
                <summary className="mono text-[10px] uppercase tracking-widest text-slate-600 hover:text-slate-400 cursor-pointer">raw progress log</summary>
                <div className="mt-3 max-h-48 overflow-y-auto bg-slate-950 border border-slate-800 rounded p-3 mono text-[11px] space-y-1">
                  {events.slice(-30).map((e, i) => (
                    <div key={i} className={
                      e.level === "warn" ? "text-amber-400" :
                      e.level === "success" ? "text-emerald-400" :
                      e.level === "active" ? "text-amber-200" : "text-slate-500"
                    }>{e.message}</div>
                  ))}
                </div>
              </details>
            </div>
          </div>
        </section>
      );
    }

    function ProgressRing({ pct, phase }) {
      const r = 70, c = 2 * Math.PI * r;
      const offset = c - (pct / 100) * c;
      return (
        <div className="flex items-center justify-center">
          <div className="relative">
            <svg width="180" height="180" viewBox="0 0 180 180" aria-hidden>
              <circle cx="90" cy="90" r={r} fill="none" stroke="#1e293b" strokeWidth="6" />
              <circle cx="90" cy="90" r={r} fill="none" stroke="#fcd34d" strokeWidth="6"
                strokeLinecap="round" strokeDasharray={c} strokeDashoffset={offset}
                transform="rotate(-90 90 90)"
                style={{ transition: "stroke-dashoffset 0.5s ease" }} />
            </svg>
            <div className="absolute inset-0 flex flex-col items-center justify-center">
              <div className="display text-[44px] text-slate-50 leading-none">{pct}<span className="text-slate-500 text-2xl">%</span></div>
              <div className="mt-2 mono text-[10px] uppercase tracking-widest text-amber-300 text-center px-2 max-w-[140px]">{phase}</div>
            </div>
          </div>
        </div>
      );
    }

    function StatChip({ label, value }) {
      return (
        <div className="border border-slate-800 bg-slate-900/40 rounded px-3 py-3 text-center">
          <div className="display text-[26px] text-amber-300 leading-none">{value.toLocaleString()}</div>
          <div className="mono text-[9px] uppercase tracking-widest text-slate-500 mt-2">{label}</div>
        </div>
      );
    }

    // ── Step 4: Wow ─────────────────────────────────────────────────────

    function WowCard({ topic, seedName, stats, onAsk }) {
      return (
        <section className="border border-emerald-400/30 rounded-lg p-10 bg-gradient-to-br from-emerald-400/[0.06] via-slate-900/40 to-amber-400/[0.04] relative overflow-hidden fade-in">
          <div className="absolute -top-20 -right-20 w-64 h-64 bg-emerald-400/10 rounded-full blur-3xl pointer-events-none" />
          <div className="flex items-center gap-3 mb-6">
            <div className="w-10 h-10 rounded-full bg-emerald-400 text-slate-950 flex items-center justify-center font-bold text-xl">✓</div>
            <div className="mono text-[11px] uppercase tracking-widest text-emerald-300">INGEST COMPLETE</div>
          </div>
          <h2 className="display text-[40px] sm:text-[52px] leading-[1.05] text-slate-50 mb-3">
            {seedName} now <em className="text-emerald-300 italic">knows</em> {topic.title.toLowerCase()}.
          </h2>
          <p className="text-slate-300 text-[16px] leading-relaxed mb-8 max-w-xl">
            Ask it anything. It cites every source — so when it tells you something, you can click straight to the timestamp and verify.
          </p>
          <div className="grid sm:grid-cols-3 gap-3 mb-10">
            <BigStat label="videos processed" value={stats.videos} />
            <BigStat label="knowledge chunks" value={stats.chunks} />
            <BigStat label="vectors indexed" value={stats.concepts} />
          </div>
          <div className="flex flex-col sm:flex-row gap-3">
            <button onClick={onAsk} className="inline-flex items-center justify-center gap-2 px-7 py-4 bg-emerald-400 text-slate-950 font-semibold text-[16px] hover:bg-emerald-300 transition rounded">
              Ask {seedName} my first question →
            </button>
            <button onClick={() => window.location.reload()}
              className="inline-flex items-center justify-center gap-2 px-7 py-4 border border-slate-700 text-slate-200 font-medium hover:border-amber-300 hover:text-amber-300 transition rounded">
              Build another expert
            </button>
          </div>
          <div className="mt-6 mono text-[10px] uppercase tracking-widest text-slate-600">
            stored on {seedName} · ~/Docs/KB/{topic.slug}.rvf
          </div>
        </section>
      );
    }

    function BigStat({ label, value }) {
      return (
        <div className="border border-slate-800 bg-slate-950/60 rounded px-5 py-5">
          <div className="display text-[40px] text-emerald-300 leading-none">{value.toLocaleString()}</div>
          <div className="mono text-[10px] uppercase tracking-widest text-slate-500 mt-2">{label}</div>
        </div>
      );
    }

    // ── Step 5: Chat ────────────────────────────────────────────────────

    function ChatStep({ topics, seedName, initialTopic, initialQuestion }) {
      const [topic, setTopic] = useState(initialTopic || topics[0]?.slug || "");
      const [q, setQ] = useState(initialQuestion);
      const [busy, setBusy] = useState(false);
      const [turns, setTurns] = useState([]);

      const ask = async () => {
        if (!q || !topic) return;
        setBusy(true);
        try {
          const res = await fetch(`${BRIDGE}/api/ask`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ question: q, topic }),
          });
          const data = await res.json();
          setTurns(prev => [...prev, { q, a: data.answer ?? data.error ?? "(no answer)", citations: data.citations ?? [] }]);
          setQ("");
        } finally { setBusy(false); }
      };

      return (
        <section className="fade-in">
          <div className="flex items-center justify-between mb-6">
            <h2 className="display text-[32px] sm:text-[40px] leading-[1.1] text-slate-50">Ask {seedName}.</h2>
            {topics.length > 1 && (
              <select value={topic} onChange={e => setTopic(e.target.value)}
                className="px-3 py-2 bg-slate-950 border border-slate-800 text-slate-200 text-sm rounded mono">
                {topics.map(t => <option key={t.slug} value={t.slug}>{t.slug}</option>)}
              </select>
            )}
          </div>
          {turns.length === 0 && initialQuestion && (
            <div className="mb-6 px-4 py-3 rounded bg-amber-300/[0.05] border border-amber-300/20 text-amber-200 text-sm">
              ✦ Pre-filled a good starter question. Edit it or hit Ask.
            </div>
          )}
          <div className="space-y-4 mb-6">
            {turns.map((t, i) => (
              <div key={i} className="border border-slate-800 bg-slate-900/40 rounded p-5">
                <div className="mono text-[10px] uppercase tracking-widest text-slate-500 mb-1">YOU</div>
                <div className="text-slate-100 mb-4">{t.q}</div>
                <div className="mono text-[10px] uppercase tracking-widest text-amber-300 mb-1">{seedName.toUpperCase()}</div>
                <AnswerBody markdown={t.a} />
                {t.citations.length > 0 && (
                  <div className="mt-4 pt-4 border-t border-slate-800">
                    <div className="mono text-[10px] uppercase tracking-widest text-emerald-300 mb-2">
                      ✦ cited from {t.citations.length} {t.citations.length === 1 ? "source" : "sources"}
                    </div>
                    <ul className="space-y-1.5 text-sm text-slate-400">
                      {t.citations.map((c, j) => <li key={j}>· {c}</li>)}
                    </ul>
                  </div>
                )}
              </div>
            ))}
          </div>
          <div className="flex gap-2">
            <input value={q} onChange={e => setQ(e.target.value)}
              onKeyDown={e => e.key === "Enter" && !busy && ask()}
              placeholder={`Ask ${seedName} anything…`} disabled={busy}
              className="flex-1 px-4 py-3 bg-slate-950 border border-slate-800 text-slate-100 rounded" />
            <button onClick={ask} disabled={busy || !q || !topic}
              className="px-6 py-3 bg-amber-300 text-slate-950 font-semibold hover:bg-amber-200 disabled:opacity-50 transition rounded">
              {busy ? "…" : "Ask"}
            </button>
          </div>
          {turns.length > 0 && (
            <div className="mt-8 pt-6 border-t border-slate-800 text-center">
              <button onClick={() => window.location.reload()}
                className="mono text-[11px] uppercase tracking-widest text-slate-500 hover:text-amber-300 transition">
                ← Build another expert
              </button>
            </div>
          )}
        </section>
      );
    }

    // ── Markdown answer renderer ────────────────────────────────────────
    // Parses with marked, then sanitizes with DOMPurify before inserting.
    // Safe against XSS even though the source is the user's local bridge.

    function AnswerBody({ markdown }) {
      const html = React.useMemo(() => {
        if (!markdown) return "";
        if (!window.marked || !window.DOMPurify) return null; // fallback to text below
        try {
          const raw = window.marked.parse(markdown, { gfm: true, breaks: false });
          return window.DOMPurify.sanitize(raw, {
            ALLOWED_TAGS: ["p","br","strong","em","b","i","u","code","pre","ul","ol","li","h1","h2","h3","h4","h5","h6","blockquote","hr","a","del","span"],
            ALLOWED_ATTR: ["href","title","rel","target"],
          });
        } catch (e) { return null; }
      }, [markdown]);
      if (html === null) {
        return <div className="text-slate-200 whitespace-pre-wrap leading-relaxed">{markdown}</div>;
      }
      return <div className="answer" dangerouslySetInnerHTML={{ __html: html }} />;
    }

    // ── Footer ──────────────────────────────────────────────────────────

    function Footer() {
      return (
        <footer className="mt-12 py-8 border-t border-slate-800">
          <div className="max-w-4xl mx-auto px-5 sm:px-6 flex flex-wrap items-center justify-between gap-4 mono text-[11px] uppercase tracking-widest text-slate-500">
            <span>learn-rv {APP_VERSION} · your hardware, your data</span>
            <a href="https://learner-rv-site.vercel.app" target="_blank" className="hover:text-amber-300 transition">learn more →</a>
          </div>
        </footer>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
