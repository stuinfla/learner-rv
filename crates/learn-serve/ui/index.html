<html lang="en">

    :root {

    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

    .mono{font-family:'IBM Plex Mono',monospace;}
    #bg{position:fixed;inset:0;pointer-events:none;z-index:0;
      background:radial-gradient(ellipse 80% 50% at 15% 20%,rgba(59,130,246,.08) 0%,transparent 60%),
                 radial-gradient(ellipse 60% 45% at 85% 75%,rgba(6,182,212,.06) 0%,transparent 60%),

    .field::placeholder{color:var(--t3);}

    .btn-p{background:linear-gradient(135deg,#1D4ED8,#0E7490);color:#fff;}
    .btn-p:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 8px 28px rgba(59,130,246,.38);}
    .btn-p:disabled{opacity:.4;cursor:not-allowed;}
    .btn-g{background:transparent;color:var(--t2);border:1px solid var(--bd);}
    .btn-g:hover{color:var(--t1);border-color:var(--bdm);}
    @keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
    @keyframes scanln{0%{transform:translateY(-100%)}100%{transform:translateY(500%)}}
    @keyframes skp{0%,100%{opacity:.35}50%{opacity:.7}}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}

    .spin{animation:spin .8s linear infinite;} .float{animation:float 5s ease-in-out infinite;}
    .bar-sh{background:linear-gradient(90deg,var(--blu) 25%,var(--cyn) 50%,var(--blu) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;}
    .dot{display:inline-block;border-radius:50%;}
    .dg{background:var(--grn);box-shadow:0 0 5px var(--grn);animation:pulse-g 2.5s ease infinite;}
    .da{background:var(--amb);} .dr{background:var(--red);} .db{background:var(--blu);}
    .tcard{position:relative;overflow:hidden;cursor:pointer;transition:all .2s;}
    .tcard::before{content:'';position:absolute;left:0;top:6px;bottom:6px;width:2px;background:linear-gradient(var(--blu),var(--cyn));border-radius:2px;transform:scaleY(0);transform-origin:bottom;transition:transform .22s;}

    .bu-u{background:linear-gradient(135deg,rgba(59,130,246,.2),rgba(6,182,212,.1));border:1px solid rgba(59,130,246,.25);border-radius:16px 16px 4px 16px;}
    .bu-a{background:var(--card);border:1px solid var(--bd);border-radius:16px 16px 16px 4px;}
    .cite{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:4px;cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:10px;background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.2);color:var(--blu);transition:all .15s;}

    .log-l{font-family:'IBM Plex Mono',monospace;font-size:11px;line-height:1.75;animation:fadeUp .25s ease both;}
    .li{color:var(--t2);} .ls{color:var(--grn);} .la{color:var(--cyn);} .lw{color:var(--amb);}
    .term{position:relative;overflow:hidden;}
    .term::after{content:'';position:absolute;left:0;right:0;height:36px;background:linear-gradient(transparent,rgba(6,182,212,.025),transparent);animation:scanln 3.5s linear infinite;pointer-events:none;}

    .sdot{width:7px;height:7px;border-radius:50%;background:var(--bdm);transition:all .3s;}
    .sdot.on{background:var(--blu);box-shadow:0 0 8px rgba(59,130,246,.65);width:20px;border-radius:4px;}
    .sdot.done{background:var(--cyn);}
    .tcur::after{content:'|';animation:blink 1s ease infinite;color:var(--blu);}
    .grad-text{background:linear-gradient(135deg,#60A5FA,#22D3EE);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}

  msg:   [['p','M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z']],

};
const Ico = ({ n, s=16, cls='' }) => {
  const items = ICO_D[n] || [];
  const elems = items.map(([type, val], i) => {
    if (type === 'p') return <path key={i} d={val}/>;
    if (type === 'poly') return <polygon key={i} points={val}/>;
    if (type === 'c') {
      const [cx,cy,r] = val.split(',');
      return <circle key={i} cx={cx} cy={cy} r={r}/>;
    }
    if (type === 'e') {
      const [cx,cy,rx,ry] = val.split(',');
      return <ellipse key={i} cx={cx} cy={cy} rx={rx} ry={ry}/>;
    }
    if (type === 'r4') {
      const [x,y,w,h] = val.split(',');
      return <rect key={i} x={x} y={y} width={w} height={h} rx="2"/>;
    }
    if (type === 'r2') {
      const [x,y,w,h] = val.split(',');
      return <rect key={i} x={x} y={y} width={w} height={h}/>;
    }
    if (type === 'r1') {
      const [x,y,w,h] = val.split(',');
      return <rect key={i} x={x} y={y} width={w} height={h} rx="2"/>;
    }
    return null;
  });
  return (
    <svg width={s} height={s} viewBox="0 0 24 24" fill="none"
      stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"
      className={cls}>
      {elems}
    </svg>
  );
};

const Onboarding = ({ onDone }) => {
  const [step,setStep]   = useState(1);
  const [url,setUrl]     = useState('');
  const [log,setLog]     = useState([]);
  const [pct,setPct]     = useState(0);
  const [done,setDone]   = useState(false);
  const [q,setQ]         = useState('');
  const [ans,setAns]     = useState('');
  const [typing,setTyping] = useState(false);
  const [selIdx,setSelIdx] = useState(0);
  const logRef = useRef(null);
  useEffect(()=>{ if(logRef.current) logRef.current.scrollTop=logRef.current.scrollHeight; },[log]);
  const addLog = (msg,type='info') => setLog(p=>[...p,{msg,type,id:Date.now()+Math.random()}]);
  const lcls = {info:'li',success:'ls',active:'la',warn:'lw'};
  const selSlug = TOPICS_2026[selIdx].slug;

  const simulateIngest = () => {
    const slug = TOPICS_2026[selIdx].slug;
    const steps = [
      [200,  'Resolving source…',                       'info'],
      [700,  'Fetching video metadata',                 'info'],
      [1200, 'Downloading transcript (auto-captions)…', 'active'],
      [2000, '1,204 segments · 18,600 words',           'success'],
      [2400, 'Analysing pHash frame variance…',         'active'],
      [3100, 'Variance 0.43 — extracting keyframes',    'info'],
      [3600, '58 keyframes extracted',                  'success'],
      [4000, 'Captioning with Sonnet vision…',          'active'],
      [5600, '58 / 58 frames captioned',                'success'],
      [6000, '124 chunks @ 300 tokens',                 'info'],
      [6600, 'Embedding (all-MiniLM-L6-v2)…',          'active'],
      [7400, 'Indexed 124 vectors → HNSW',              'success'],
      [7700, `Writing ~/Docs/KB/${slug}.rvf`,           'info'],
      [8100, `Done · 124 chunks · 58 frames · 3.2 MB`, 'success'],
    ];
    steps.forEach(([ms,msg,type],i)=>setTimeout(()=>{
      addLog(msg,type);
      setPct(Math.round((i/(steps.length-1))*100));
      if(i===steps.length-1)setDone(true);
    },ms));
  };

  const handleAsk = () => {
    if(!q.trim()||typing) return;
    setTyping(true); setAns('');
    const text = SAMPLE_ANSWERS[selSlug] || "Based on the knowledge base, here is what I found…";
    let i=0; const t=setInterval(()=>{
      if(i<text.length) setAns(text.slice(0,++i));
      else { clearInterval(t); setTyping(false); }
    },13);
  };

  const stepMeta = [{n:1,label:'See it'},{n:2,label:'Add video'},{n:3,label:'Processing'},{n:4,label:'Ask'}];

  return (
    <div className="fixed inset-0 flex items-center justify-center" style={{background:'var(--void)'}}>
      <div style={{position:'absolute',top:'28%',left:'50%',transform:'translate(-50%,-50%)',width:720,height:720,borderRadius:'50%',background:'radial-gradient(circle,rgba(59,130,246,.09) 0%,transparent 65%)',pointerEvents:'none'}}/>

      <div className="glass fade-up" style={{position:'relative',width:'min(900px,96vw)',maxHeight:'93vh',borderRadius:20,border:'1px solid var(--bdm)',boxShadow:'0 40px 120px rgba(0,0,0,.75)',display:'flex',flexDirection:'column'}}>
        <button onClick={onDone} className="btn btn-g absolute" style={{top:15,right:15,borderRadius:8,padding:'5px 12px',fontSize:12,gap:5,zIndex:10}}>
          Skip <Ico n="chv" s={12}/>
        </button>

        <div style={{flex:1,overflowY:'auto',padding:'40px 46px 28px'}}>

          {/* ── Step 1 ── */}
          {step===1&&<div className="fade-up">
            <div className="mono" style={{fontSize:10,letterSpacing:'.15em',textTransform:'uppercase',color:'var(--cyn)',marginBottom:14}}>learn-rv · 2026</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1.15fr',gap:36,alignItems:'start'}}>
              <div>
                <h1 style={{fontSize:31,fontWeight:700,letterSpacing:'-.03em',lineHeight:1.15,marginBottom:16}}>
                  Turn <span className="grad-text">any YouTube video</span> into a knowledge base you can query forever.
                </h1>
                <p style={{fontSize:14,color:'var(--t2)',lineHeight:1.72,marginBottom:24}}>
                  Paste a URL. Learn-RV downloads the transcript, captures key frames with AI vision, builds a local vector knowledge base, and lets you ask questions in plain language — with timestamped citations back to the exact moment in the video.
                </p>
                <div style={{display:'flex',flexWrap:'wrap',gap:7,marginBottom:30}}>
                  {['Runs 100% locally','No cloud, no subscription','Syncs to Cognitum Seed','Full citations on every answer'].map(l=>(
                    <span key={l} style={{fontSize:11,fontWeight:500,padding:'4px 10px',borderRadius:6,background:'rgba(59,130,246,.1)',border:'1px solid rgba(59,130,246,.2)',color:'var(--blu)'}}>{l}</span>
                  ))}
                </div>
                <button onClick={()=>setStep(2)} className="btn btn-p w-full" style={{borderRadius:11,padding:'14px 0',fontSize:15,gap:10}}>
                  Build my first knowledge base <Ico n="arr" s={16}/>
                </button>
              </div>
              <div style={{height:370}} className="float">
                <ProductPreview/>
              </div>
            </div>
          </div>}

          {/* ── Step 2 ── */}
          {step===2&&<div className="fade-up">
            <div className="mono" style={{fontSize:10,letterSpacing:'.15em',textTransform:'uppercase',color:'var(--cyn)',marginBottom:16}}>Step 2 of 4 · Choose a topic</div>
            <h2 style={{fontSize:24,fontWeight:700,letterSpacing:'-.025em',marginBottom:8}}>What do you want to master?</h2>
            <p style={{fontSize:14,color:'var(--t2)',lineHeight:1.65,marginBottom:22}}>Select a topic below or paste any YouTube URL. Learn-RV ingests the video through this pipeline:</p>
            <Pipeline/>
            <div className="mono" style={{fontSize:10,color:'var(--t3)',letterSpacing:'.06em',marginBottom:10,textTransform:'uppercase'}}>Popular starting points — May 2026</div>
            <div style={{display:'flex',flexDirection:'column',gap:7,marginBottom:18}}>
              {TOPICS_2026.map((t,i)=>(
                <div key={t.slug} onClick={()=>{setSelIdx(i);setUrl('https://youtube.com/');}} style={{borderRadius:10,padding:'12px 14px',cursor:'pointer',display:'flex',alignItems:'center',gap:12,border:`1px solid ${selIdx===i?'var(--bdh)':'var(--bd)'}`,background:selIdx===i?'rgba(59,130,246,.1)':'rgba(12,24,40,.5)',transition:'all .15s'}}>
                  <span style={{fontSize:20,flexShrink:0}}>{t.icon}</span>
                  <div style={{flex:1,minWidth:0}}>
                    <div className="mono" style={{fontSize:12,fontWeight:500,color:selIdx===i?'var(--blu)':'var(--t1)',marginBottom:2}}>{t.slug}</div>
                    <div style={{fontSize:11,color:'var(--t3)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.desc}</div>
                  </div>
                  {selIdx===i&&<div style={{color:'var(--grn)',flexShrink:0}}><Ico n="chk" s={16}/></div>}
                </div>
              ))}
            </div>
            <div style={{borderTop:'1px solid var(--bd)',paddingTop:16,marginBottom:22}}>
              <div className="mono" style={{fontSize:10,color:'var(--t3)',letterSpacing:'.06em',marginBottom:8,textTransform:'uppercase'}}>Or paste your own URL</div>
              <input className="field mono" style={{borderRadius:9,padding:'11px 14px',fontSize:13}} placeholder="https://www.youtube.com/watch?v=… or @channel or playlist" value={url} onChange={e=>setUrl(e.target.value)}/>
            </div>
            <div style={{display:'flex',gap:10}}>
              <button onClick={()=>setStep(1)} className="btn btn-g" style={{borderRadius:9,padding:'11px 20px',fontSize:14}}>Back</button>
              <button onClick={()=>{setStep(3);simulateIngest();}} className="btn btn-p flex-1" style={{borderRadius:9,padding:'11px 0',fontSize:14,gap:9}}>
                Start building <Ico n="upl" s={15}/>
              </button>
            </div>
          </div>}

          {/* ── Step 3 ── */}
          {step===3&&<div className="fade-up">
            <div className="mono" style={{fontSize:10,letterSpacing:'.15em',textTransform:'uppercase',color:'var(--cyn)',marginBottom:16}}>Step 3 of 4 · Processing</div>
            <h2 style={{fontSize:24,fontWeight:700,letterSpacing:'-.025em',marginBottom:6}}>Building your knowledge base</h2>
            <p style={{fontSize:14,color:'var(--t2)',lineHeight:1.65,marginBottom:22}}>Extracting the transcript, capturing key frames with Sonnet vision, generating embeddings, and indexing everything into HNSW for instant retrieval.</p>
            <div style={{marginBottom:7,borderRadius:6,height:6,background:'var(--void)',overflow:'hidden'}}>
              <div className={pct<100?'bar-sh':''} style={{height:'100%',width:`${pct}%`,borderRadius:6,transition:'width .5s ease',background:pct===100?'var(--grn)':undefined}}/>
            </div>
            <div className="mono" style={{fontSize:10,color:'var(--t3)',textAlign:'right',marginBottom:18}}>{pct}%</div>
            <div style={{borderRadius:12,overflow:'hidden',border:'1px solid var(--bd)',marginBottom:22}}>
              <div style={{background:'rgba(2,6,15,.9)',padding:'9px 14px',display:'flex',alignItems:'center',gap:6,borderBottom:'1px solid var(--bd)'}}>
                <div style={{width:10,height:10,borderRadius:'50%',background:'#FF5F57'}}/><div style={{width:10,height:10,borderRadius:'50%',background:'#FEBC2E'}}/><div style={{width:10,height:10,borderRadius:'50%',background:'#28C840'}}/>
                <span className="mono" style={{fontSize:11,color:'var(--t3)',marginLeft:8}}>learn ingest · {selSlug}</span>
              </div>
              <div className="term" style={{background:'rgba(2,6,15,.85)',height:190,padding:'14px 16px'}}>
                <div ref={logRef} style={{height:'100%',overflowY:'auto'}}>
                  {log.length===0&&<div className="log-l li" style={{opacity:.4}}>Initialising pipeline…</div>}
                  {log.map(e=><div key={e.id} className={`log-l ${lcls[e.type]||'li'}`}><span style={{color:'var(--t3)',marginRight:8}}>›</span>{e.msg}</div>)}
                  {!done&&log.length>0&&<div className="log-l la tcur" style={{opacity:.6}}/>}
                </div>
              </div>
            </div>
            {done
              ?<button onClick={()=>setStep(4)} className="btn btn-p w-full" style={{borderRadius:10,padding:'13px 0',fontSize:14,gap:8}}><Ico n="chk" s={16}/>Knowledge base ready — ask your first question</button>
              :<div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:10,color:'var(--t3)',fontSize:13}}><Ico n="ld" s={16} cls="spin"/> Typically 20–90 s · depends on video length</div>}
          </div>}

          {/* ── Step 4 ── */}
          {step===4&&<div className="fade-up">
            <div className="mono" style={{fontSize:10,letterSpacing:'.15em',textTransform:'uppercase',color:'var(--cyn)',marginBottom:16}}>Step 4 of 4 · Ask anything</div>
            <h2 style={{fontSize:24,fontWeight:700,letterSpacing:'-.025em',marginBottom:8}}>Your knowledge base is ready.</h2>
            <p style={{fontSize:14,color:'var(--t2)',lineHeight:1.65,marginBottom:22}}>Ask any question about <span className="mono" style={{color:'var(--blu)'}}>{selSlug}</span>. Every answer includes precise timestamp citations so you can jump straight to the moment in the video.</p>
            <div style={{marginBottom:18}}>
              <div className="mono" style={{fontSize:10,color:'var(--t3)',letterSpacing:'.06em',marginBottom:10,textTransform:'uppercase'}}>Suggested questions</div>
              <div style={{display:'flex',flexDirection:'column',gap:7}}>
                {(SAMPLE_QS[selSlug]||[]).slice(0,3).map(s=>(
                  <button key={s} onClick={()=>setQ(s)} className="btn btn-g" style={{borderRadius:9,padding:'11px 14px',fontSize:13,justifyContent:'flex-start',textAlign:'left'}}>
                    <span style={{color:'var(--cyn)',marginRight:10,flexShrink:0}}>→</span>{s}
                  </button>
                ))}
              </div>
            </div>
            <div style={{display:'flex',gap:8,marginBottom:16}}>
              <input className="field flex-1" style={{borderRadius:10,padding:'12px 16px',fontSize:14}} placeholder="Or type your own question…" value={q} onChange={e=>setQ(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handleAsk()}/>
              <button onClick={handleAsk} disabled={typing||!q.trim()} className="btn btn-p" style={{borderRadius:10,padding:'12px 18px'}}>{typing?<Ico n="ld" s={16} cls="spin"/>:<Ico n="send" s={16}/>}</button>
            </div>
            {(ans||typing)&&<div className="glass fade-in" style={{borderRadius:12,padding:'16px 18px',marginBottom:20}}>
              <p style={{fontSize:14,lineHeight:1.75,color:'var(--t1)'}}>{ans||''}{typing&&!ans&&<Ico n="ld" s={14} cls="spin"/>}{typing&&ans&&<span className="blink" style={{color:'var(--blu)'}}> |</span>}</p>
              {!typing&&ans&&<div style={{marginTop:12,display:'flex',gap:6,flexWrap:'wrap'}}>{(SAMPLE_CITES[selSlug]||[]).map((c,i)=><span key={i} className="cite"><Ico n="lnk" s={10}/>{c}</span>)}</div>}
            </div>}
            <button onClick={onDone} className="btn btn-p w-full" style={{borderRadius:10,padding:'14px 0',fontSize:15,gap:10}}>
              Open dashboard <Ico n="arr" s={16}/>
            </button>
          </div>}
        </div>

        <div style={{padding:'18px 46px 22px',borderTop:'1px solid var(--bd)',display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0}}>
          <div style={{display:'flex',gap:8,alignItems:'center'}}>
            {stepMeta.map(s=><div key={s.n} className={`sdot ${step===s.n?'on':step>s.n?'done':''}`} onClick={()=>step>s.n&&setStep(s.n)} style={{cursor:step>s.n?'pointer':'default',transition:'all .3s'}}/>)}
          </div>
          <span className="mono" style={{fontSize:10,color:'var(--t3)'}}>{stepMeta[step-1]?.label}</span>
        </div>
      </div>
    </div>
  );
};

const Skel = () => <div className="glass" style={{borderRadius:10,padding:'12px 14px',marginBottom:6,border:'1px solid var(--bd)'}}><div className="sk" style={{height:11,width:'58%',marginBottom:8}}/><div className="sk" style={{height:9,width:'40%'}}/></div>;

// ── Ingest Pipeline Visual ────────────────────────────────────────────────────
const PIPE_STAGES = [
  {icon:'🎬', label:'Video',      key:'video'},
  {icon:'📝', label:'Transcript', key:'transcript'},
  {icon:'🖼',  label:'Frames',    key:'frames'},
  {icon:'⚡', label:'Vectors',   key:'vectors'},
  {icon:'💾', label:'Local KB',  key:'local'},
  {icon:'🧠', label:'Seed',      key:'seed'},
];

const IngestPipeline = ({ stage, pct, seedIp, running }) => {
  const stageColors = [
    'rgba(59,130,246,.9)',   // video — blue
    'rgba(6,182,212,.9)',    // transcript — cyan
    'rgba(139,92,246,.9)',   // frames — violet
    'rgba(245,158,11,.9)',   // vectors — amber
    'rgba(16,185,129,.9)',   // local — green
    'rgba(16,185,129,.9)',   // seed — green
  ];
  return (
    <div style={{borderRadius:12,border:'1px solid var(--bd)',padding:'14px 12px',background:'rgba(2,6,15,.55)'}}>
      {/* Stage nodes */}
      <div style={{display:'flex',alignItems:'center',gap:0,marginBottom:12}}>
        {PIPE_STAGES.map((s,i)=>{
          const isActive = stage===i && running;
          const isDone   = stage>i || (stage===i && !running);
          const isPending= stage<i;
          const isSeed   = i===5;
          const seedLabel= isSeed&&seedIp ? seedIp : s.label;
          return (
            <div key={s.key} style={{display:'flex',alignItems:'center',flex:1,flexDirection:'column',gap:0}}>
              <div style={{display:'flex',alignItems:'center',width:'100%'}}>
                {/* Flow line before */}
                {i>0&&<div style={{flex:1,height:2,background:isDone||isActive
                  ?`linear-gradient(90deg,${stageColors[i-1]},${stageColors[i]})`
                  :'var(--bd)',transition:'background .6s ease',position:'relative',overflow:'hidden'}}>
                  {isActive&&<div style={{position:'absolute',top:0,left:0,right:0,bottom:0,
                    background:`linear-gradient(90deg,transparent,${stageColors[i]},transparent)`,
                    animation:'shimmer 1.2s infinite',backgroundSize:'200% 100%'}}/>}
                </div>}
                {/* Node circle */}
                <div style={{
                  width:isSeed?32:26, height:isSeed?32:26, borderRadius:'50%', flexShrink:0,
                  display:'flex', alignItems:'center', justifyContent:'center',
                  fontSize:isSeed?14:12,
                  border:`1px solid ${isDone?stageColors[i]:isActive?stageColors[i]:'var(--bd)'}`,
                  background:isDone?`${stageColors[i].replace('.9','0.2')}`:isActive?`${stageColors[i].replace('.9','0.15')}`:'transparent',
                  boxShadow:isActive?`0 0 10px ${stageColors[i].replace('.9','0.5')}`:'none',
                  animation:isActive?'pulse-g 1.5s ease infinite':'none',
                  transition:'all .4s ease',
                  position:'relative',
                }}>
                  {isDone&&!isActive ? <span style={{fontSize:10,color:stageColors[i]}}>✓</span> : <span>{s.icon}</span>}
                </div>
                {/* Flow line after (not last) */}
                {i<PIPE_STAGES.length-1&&<div style={{flex:1,height:2,background:isDone?stageColors[i]:'var(--bd)',transition:'background .6s ease'}}/>}
              </div>
            </div>
          );
        })}
      </div>

      {/* Labels */}
      <div style={{display:'flex',gap:0}}>
        {PIPE_STAGES.map((s,i)=>{
          const isDone = stage>i||(stage===i&&!running);
          const isActive = stage===i&&running;
          const isSeed = i===5;
          const lbl = isSeed&&seedIp ? seedIp : s.label;
          return (
            <div key={s.key} style={{flex:1,textAlign:'center',fontFamily:'"IBM Plex Mono",monospace',
              fontSize:isSeed?9:8,lineHeight:1.3,
              color:isDone||isActive?'var(--t2)':'var(--t3)',
              fontWeight:isActive?600:400,
              transition:'color .3s',
              overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',padding:'0 1px'}}>
              {lbl}
            </div>
          );
        })}
      </div>

      {/* Progress bar */}
      {pct>0&&<div style={{marginTop:12,borderRadius:4,height:3,background:'var(--void)',overflow:'hidden'}}>
        <div className={running?'bar-sh':''} style={{height:'100%',width:`${pct}%`,borderRadius:4,
          transition:'width .5s ease',background:!running&&pct>0?'var(--grn)':undefined}}/>
      </div>}

      {/* Status text */}
      <div style={{marginTop:8,fontSize:10,color:'var(--t2)',textAlign:'center',fontFamily:'"IBM Plex Mono",monospace',minHeight:14}}>
        {running&&stage===0&&'Fetching source…'}
        {running&&stage===1&&'Downloading transcript…'}
        {running&&stage===2&&'Extracting & captioning frames…'}
        {running&&stage===3&&'Embedding and indexing vectors…'}
        {running&&stage===4&&'Writing to local KB…'}
        {running&&stage===5&&`Syncing to Seed ${seedIp||''}…`}
        {!running&&pct===100&&stage===5&&<span style={{color:'var(--grn)'}}>Stored locally + synced to Seed {seedIp}</span>}
        {!running&&pct===100&&stage===4&&<span style={{color:'var(--grn)'}}>Stored locally in ~/Docs/KB/</span>}
        {!running&&pct===0&&stage>=0&&'Ready'}
      </div>
    </div>
  );
};

const Dashboard = () => {
  const [live,setLive]     = useState(false);
  const [topics,setTopics] = useState([]);
  const [loading,setLoad]  = useState(true);
  const [sel,setSel]       = useState(null);
  const [msgs,setMsgs]     = useState([]);
  const [input,setInput]   = useState('');
  const [asking,setAsking] = useState(false);
  const [inUrl,setInUrl]   = useState('');
  const [inTopic,setInT]   = useState('');
  const [inLog,setInLog]   = useState([]);
  const [inPct,setInPct]   = useState(0);
  const [ingst,setIngst]   = useState(false);
  const [inStage,setInStage] = useState(-1); // -1=idle, 0-5=active stage
  const [seed,setSeed]     = useState({connected:false,ip:null});
  const [model,setModel]   = useState('all-MiniLM-L6-v2');
  const chatEnd = useRef(null);
  const inLogR  = useRef(null);
  const lcls    = {info:'li',success:'ls',active:'la',warn:'lw'};

  // Map log messages to pipeline stage index
  const stageFromMsg = (msg) => {
    const m = msg.toLowerCase();
    if (m.includes('resolving') || m.includes('fetching metadata')) return 0;
    if (m.includes('transcript') || m.includes('segments')) return 1;
    if (m.includes('keyframe') || m.includes('captioning') || m.includes('frame')) return 2;
    if (m.includes('embedding') || m.includes('indexed') || m.includes('hnsw') || m.includes('chunk')) return 3;
    if (m.includes('.rvf') || m.includes('done')) return 4;
    if (m.includes('seed') || m.includes('push') || m.includes('sync') || m.includes('10.0.0')) return 5;
    return -1;
  };

  useEffect(()=>{ const c=async()=>{ try{const r=await fetch(`${API}/api/health`,{signal:AbortSignal.timeout(1800)});setLive(r.ok);}catch{setLive(false);} }; c(); const id=setInterval(c,5000); return()=>clearInterval(id); },[]);
  useEffect(()=>{
    const load=async()=>{
      setLoad(true);
      try {
        const r=await fetch(`${API}/api/topics`); const d=await r.json();
        setTopics(d.topics||[]); if((d.topics||[]).length>0&&!sel) setSel(d.topics[0].slug);
        const s=await fetch(`${API}/api/status`); const sd=await s.json();
        setSeed(sd.seed||{connected:false,ip:null}); setModel(sd.model||'all-MiniLM-L6-v2');
      } catch {
        const now = new Date();
        const d=(n)=>new Date(now-n*86400000).toISOString();
        const demo=[{slug:'reasoning-models-2026',video_count:5,chunks:1340,size_kb:5800,updated_at:d(1)},{slug:'karpathy-ml-lectures',video_count:8,chunks:2840,size_kb:11200,updated_at:d(0)},{slug:'sequoia-ai-report',video_count:2,chunks:480,size_kb:1900,updated_at:d(5)},{slug:'ai-agents-in-production',video_count:8,chunks:1740,size_kb:7100,updated_at:d(2)},{slug:'anthropic-interpretability',video_count:4,chunks:960,size_kb:3800,updated_at:d(3)}];
        setTopics(demo); if(!sel)setSel('karpathy-ml-lectures');
      } finally{setLoad(false);}
    };
    load();
  },[live]);
  useEffect(()=>{ chatEnd.current?.scrollIntoView({behavior:'smooth'}); },[msgs]);
  useEffect(()=>{ if(inLogR.current) inLogR.current.scrollTop=inLogR.current.scrollHeight; },[inLog]);

  const selData = topics.find(t=>t.slug===sel);
  const addInLog=(msg,type='info')=>{
    setInLog(p=>[...p,{msg,type,id:Date.now()+Math.random()}]);
    const s=stageFromMsg(msg); if(s>=0) setInStage(s);
  };

  const handleAsk=async()=>{
    if(!input.trim()||asking)return;
    const q=input.trim(); setInput(''); setAsking(true);
    const uid=Date.now(); setMsgs(p=>[...p,{id:uid,role:'user',content:q,citations:[]}]);
    const aid=uid+1; setMsgs(p=>[...p,{id:aid,role:'assistant',content:'',streaming:true,citations:[]}]);
    try {
      const r=await fetch(`${API}/api/ask`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({question:q,topic:sel})});
      const d=await r.json();
      setMsgs(p=>p.map(m=>m.id===aid?{...m,content:d.answer,citations:d.citations||[],streaming:false}:m));
      setAsking(false);
    } catch {
      const demo=`Based on the "${sel}" knowledge base, the most relevant passage appears at 12:34 in the primary source. The speaker explains the core mechanism in depth there. A complementary perspective appears at 31:07 with concrete examples.`;
      let i=0; const t=setInterval(()=>{ if(i<demo.length) setMsgs(p=>p.map(m=>m.id===aid?{...m,content:demo.slice(0,++i)}:m)); else{clearInterval(t);setMsgs(p=>p.map(m=>m.id===aid?{...m,streaming:false,citations:[`${sel} @ 12:34`,`${sel} @ 31:07`]}:m));setAsking(false);} },14);
    }
  };

  const handleIngest=()=>{
    if(!inUrl.trim()||ingst)return;
    setIngst(true);setInLog([]);setInPct(0);setInStage(0);
    try {
      const qs=new URLSearchParams({source:inUrl,topic:inTopic}).toString();
      const es=new EventSource(`${API}/api/ingest/progress?${qs}`);
      es.onmessage=e=>{ const d=JSON.parse(e.data); addInLog(d.message,d.level||'info'); if(d.progress!==undefined)setInPct(d.progress); if(d.done){es.close();setIngst(false);} };
      es.onerror=()=>{ es.close(); simIngest(); };
    } catch { simIngest(); }
  };
  const simIngest=()=>{
    const seedIp = seed.connected ? seed.ip : null;
    const seedSteps = seedIp ? [
      [8700, `Pushing to Cognitum Seed ${seedIp}…`, 'active'],
      [9400, 'Transferring .rvf (3.2 MB)…', 'active'],
      [10200, `Seed indexed: 124 chunks · 58 frames`, 'success'],
      [10500, `Synced to Seed ${seedIp}`, 'success'],
    ] : [
      [8700, 'Seed not configured — skipping push', 'warn'],
    ];
    const base=[
      [250,'Resolving source…','info'],[750,'Fetching metadata','info'],
      [1300,'Downloading transcript…','active'],[2100,'1,204 segments · 18,600 words','success'],
      [2500,'Analysing frame variance…','active'],[3200,'Extracting 58 keyframes','info'],
      [4000,'Captioning (Sonnet vision)…','active'],[5600,'58 / 58 frames captioned','success'],
      [6000,'124 chunks @ 300 tokens','info'],[6800,'Embedding (all-MiniLM-L6-v2)…','active'],
      [7600,'Indexed 124 vectors → HNSW','success'],[8000,'Wrote .rvf to ~/Docs/KB/','success'],
      [8200,'Done · 124 chunks · 58 frames · 3.2 MB','success'],
    ];
    const steps = [...base, ...seedSteps];
    const last = steps[steps.length-1][0];
    steps.forEach(([ms,msg,type],i)=>setTimeout(()=>{
      addInLog(msg,type);
      setInPct(Math.min(100,Math.round((ms/last)*100)));
      if(i===steps.length-1){ setIngst(false); setInStage(seedIp?5:4); }
    },ms));
  };

  const totalMb    = topics.reduce((s,t)=>s+(t.size_kb||0),0)/1024;
  const totalChunks= topics.reduce((s,t)=>s+(t.chunks||0),0);
  const selQs      = sel ? (SAMPLE_QS[sel]||[`Summarise the key ideas in ${sel}`,`What are the most surprising findings?`,`What practical steps does the speaker recommend?`]) : [];

  return (
    <div style={{height:'100vh',display:'flex',flexDirection:'column'}}>
      <header className="glass" style={{height:50,padding:'0 18px',display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0,zIndex:10,borderBottom:'1px solid var(--bd)'}}>
        <div style={{display:'flex',alignItems:'center',gap:16}}>
          <div style={{display:'flex',alignItems:'center',gap:9}}>
            <div style={{width:28,height:28,borderRadius:8,display:'flex',alignItems:'center',justifyContent:'center',background:'linear-gradient(135deg,#1D4ED8,#0E7490)'}}><Ico n="brain" s={14}/></div>
            <span className="mono" style={{fontSize:13,fontWeight:600,letterSpacing:'-.01em'}}>learn-rv</span>
          </div>
          <div style={{height:18,width:1,background:'var(--bd)'}}/>
          <span style={{fontSize:12,color:'var(--t3)',display:'flex',alignItems:'center',gap:5}}><Ico n="fld" s={11}/>{topics.length} topics</span>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <div style={{display:'flex',alignItems:'center',gap:6,fontSize:12}}>
            <span style={{color:'var(--t3)'}}>{live?'Live':'Offline'}</span>
            <span className={`dot ${live?'dg':'dr'}`} style={{width:7,height:7}}/>
          </div>
          <div style={{height:18,width:1,background:'var(--bd)'}}/>
          <div style={{display:'flex',alignItems:'center',gap:6,fontSize:12,padding:'4px 10px',borderRadius:7,border:'1px solid var(--bd)',background:seed.connected?'rgba(16,185,129,.07)':'transparent'}}>
            <Ico n="cpu" s={12}/><span style={{color:seed.connected?'var(--grn)':'var(--t3)'}}>{seed.connected?`Seed · ${seed.ip}`:'Seed offline'}</span>
            <span className={`dot ${seed.connected?'dg':'dr'}`} style={{width:6,height:6}}/>
          </div>
        </div>
      </header>

      <div style={{flex:1,display:'grid',gridTemplateColumns:'230px 1fr 286px',overflow:'hidden'}}>
        <div style={{borderRight:'1px solid var(--bd)',padding:'12px 10px',overflowY:'auto'}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',paddingLeft:5,paddingRight:5,marginBottom:10}}>
            <span className="mono" style={{fontSize:9,letterSpacing:'.1em',textTransform:'uppercase',color:'var(--t3)'}}>Topics</span>
            <button className="btn btn-g" style={{borderRadius:6,padding:4,border:'1px solid var(--bd)'}}><Ico n="plus" s={13}/></button>
          </div>
          {loading?[1,2,3,4].map(i=><Skel key={i}/>):topics.map(t=><TopicCard key={t.slug} t={t} active={sel===t.slug} onClick={()=>setSel(t.slug)}/>)}
        </div>

        <div style={{display:'flex',flexDirection:'column',overflow:'hidden'}}>
          {sel&&<div style={{padding:'10px 20px',borderBottom:'1px solid var(--bd)',display:'flex',alignItems:'center',gap:10,flexShrink:0}}>
            <Ico n="msg" s={13}/><span className="mono" style={{fontSize:12,color:'var(--blu)'}}>{sel}</span>
            {selData&&<span style={{fontSize:11,color:'var(--t3)'}}>· {selData.chunks||0} chunks · {selData.video_count||0} videos</span>}
          </div>}
          <div style={{flex:1,overflowY:'auto',padding:'20px'}}>
            {msgs.length===0&&sel&&(
              <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100%',gap:22,paddingBottom:60}}>
                <div style={{textAlign:'center'}}>
                  <div style={{fontSize:36,marginBottom:12}}>💬</div>
                  <div style={{fontWeight:600,fontSize:17,marginBottom:8}}>Ask anything about {sel}</div>
                  <p style={{fontSize:13,color:'var(--t2)',lineHeight:1.65,maxWidth:380}}>I can answer questions, find specific moments, summarise key ideas, compare concepts across videos — all with timestamp citations.</p>
                </div>
                <div style={{display:'flex',flexDirection:'column',gap:8,width:'100%',maxWidth:460}}>
                  {selQs.map(q=><button key={q} onClick={()=>setInput(q)} className="btn btn-g" style={{borderRadius:9,padding:'11px 16px',fontSize:13,justifyContent:'flex-start',textAlign:'left'}}><span style={{color:'var(--cyn)',marginRight:10,flexShrink:0}}>→</span>{q}</button>)}
                </div>
              </div>
            )}
            {msgs.map(m=><ChatMsg key={m.id} m={m}/>)}
            <div ref={chatEnd}/>
          </div>
          <div style={{padding:'12px 20px',borderTop:'1px solid var(--bd)',flexShrink:0}}>
            <div style={{display:'flex',gap:8}}>
              <input className="field flex-1" style={{borderRadius:11,padding:'11px 16px',fontSize:14}} placeholder={sel?`Ask about ${sel}…`:'Select a topic first'} value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&!e.shiftKey&&handleAsk()} disabled={!sel}/>
              <button onClick={handleAsk} disabled={!input.trim()||asking} className="btn btn-p" style={{borderRadius:11,padding:'11px 16px',opacity:(!input.trim()||asking)?.45:1}}>{asking?<Ico n="ld" s={16} cls="spin"/>:<Ico n="send" s={16}/>}</button>
            </div>
            <div className="mono" style={{marginTop:7,fontSize:10,color:'var(--t3)',textAlign:'center'}}>Enter to send · every answer includes timestamp citations</div>
          </div>
        </div>

        <div style={{borderLeft:'1px solid var(--bd)',padding:'14px',overflowY:'auto',display:'flex',flexDirection:'column',gap:13}}>
          <span className="mono" style={{fontSize:9,letterSpacing:'.1em',textTransform:'uppercase',color:'var(--t3)'}}>Ingest</span>
          <div><label className="mono" style={{fontSize:9,color:'var(--t3)',letterSpacing:'.06em',display:'block',marginBottom:6,textTransform:'uppercase'}}>Source URL</label><input className="field mono" style={{borderRadius:8,padding:'9px 12px',fontSize:11}} placeholder="https://youtube.com/…" value={inUrl} onChange={e=>setInUrl(e.target.value)}/></div>
          <div><label className="mono" style={{fontSize:9,color:'var(--t3)',letterSpacing:'.06em',display:'block',marginBottom:6,textTransform:'uppercase'}}>Topic (optional)</label><input className="field mono" style={{borderRadius:8,padding:'9px 12px',fontSize:11}} placeholder="my-topic-slug" value={inTopic} onChange={e=>setInT(e.target.value)}/></div>
          <button onClick={handleIngest} disabled={!inUrl.trim()||ingst} className="btn btn-p" style={{borderRadius:9,padding:'10px',fontSize:13,gap:8,opacity:(!inUrl.trim()||ingst)?.45:1}}>{ingst?<><Ico n="ld" s={14} cls="spin"/>Processing…</>:<><Ico n="upl" s={14}/>Start ingest</>}</button>

          {/* Visual pipeline — shown when ingest is running or complete */}
          {inStage>=0&&<IngestPipeline stage={inStage} pct={inPct} seedIp={seed.ip} running={ingst}/>}

          {/* Compact log */}
          {inLog.length>0&&<div>
            <div className="mono" style={{fontSize:9,letterSpacing:'.06em',color:'var(--t3)',marginBottom:6,textTransform:'uppercase'}}>Log</div>
            <div className="term glass" style={{borderRadius:9,padding:'8px 12px',maxHeight:160,overflow:'hidden'}}>
              <div ref={inLogR} style={{maxHeight:150,overflowY:'auto'}}>
                {inLog.map(e=><div key={e.id} className={`log-l ${lcls[e.type]||'li'}`}><span style={{color:'var(--t3)',marginRight:6}}>›</span>{e.msg}</div>)}
                {ingst&&<div className="log-l la tcur" style={{opacity:.6}}/>}
              </div>
            </div>
          </div>}
          <div style={{height:1,background:'var(--bd)',margin:'2px 0'}}/>
          <span className="mono" style={{fontSize:9,letterSpacing:'.1em',textTransform:'uppercase',color:'var(--t3)'}}>Commands</span>
          {[{cmd:'learn list',desc:'Browse all topics'},{cmd:'learn ask <topic> "…"',desc:'Query from the CLI'},{cmd:'learn quiz <topic>',desc:'Spaced-repetition flashcards'},{cmd:'learn push <topic>',desc:'Sync to Cognitum Seed'},{cmd:'learn doctor',desc:'Check environment & deps'},{cmd:'learn ui',desc:'Start this dashboard'}].map(a=>(
            <div key={a.cmd} className="glass" style={{borderRadius:8,padding:'9px 12px',border:'1px solid var(--bd)'}}><div className="mono" style={{fontSize:10,color:'var(--cyn)',marginBottom:2}}>{a.cmd}</div><div style={{fontSize:11,color:'var(--t3)'}}>{a.desc}</div></div>
          ))}
        </div>
      </div>

      <div className="mono" style={{height:27,borderTop:'1px solid var(--bd)',padding:'0 18px',display:'flex',alignItems:'center',gap:18,fontSize:9,color:'var(--t3)',background:'var(--void)',flexShrink:0}}>
        <span style={{display:'flex',alignItems:'center',gap:5}}><Ico n="db" s={9}/>{totalMb.toFixed(1)} MB</span>
        <span style={{display:'flex',alignItems:'center',gap:5}}><Ico n="bolt" s={9}/>{totalChunks.toLocaleString()} chunks</span>
        <span style={{display:'flex',alignItems:'center',gap:5}}><Ico n="star" s={9}/>{model}</span>
        <span style={{marginLeft:'auto',display:'flex',alignItems:'center',gap:5}}><Ico n="play" s={9}/>learn-rv v0.2.11 · May 2026</span>
      </div>
    </div>
  );
};

const App = () => {
  const [ob,setOb] = useState(()=>!localStorage.getItem('learn-rv-v3'));
  const done = () => { localStorage.setItem('learn-rv-v3','1'); setOb(false); };
  return ob ? <Onboarding onDone={done}/> : <Dashboard/>;
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
